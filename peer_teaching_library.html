<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المكتبة — The Peer Teaching Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1a2e; --ink-2:#2e2e44; --ink-3:#5a5a78; --ink-4:#9a9ab0; --ink-5:#d0d0e0;
  --parchment:#f9f7f4; --parchment-2:#f0ece4; --parchment-3:#e4ddd0;
  --gold:#d4af37; --gold-l:#e8cc70; --gold-pale:#fdf5d0;
  --teal:#1d6f6f; --teal-l:#d0eaea; --teal-d:#1a4a3a;
  --coral:#8b3a2a; --coral-l:#f5e0da;
  --blue:#1e4a7a; --blue-l:#ddeaf8;
  --purple:#4a3580; --purple-l:#eceaf8;
  --green:#3a6b2a; --green-l:#dcecd8;
  --r:8px; --rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6}

/* ── LAYOUT ── */
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.topnav{background:var(--ink);padding:0 28px;display:flex;align-items:center;gap:0;height:52px;position:sticky;top:0;z-index:50}
.topnav-logo{font-family:'Amiri',serif;font-size:17px;color:var(--gold);margin-right:28px;white-space:nowrap}
.topnav-tabs{display:flex;gap:0;height:100%}
.topnav-tab{font-size:13px;padding:0 16px;color:rgba(255,255,255,.55);cursor:pointer;display:flex;align-items:center;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap}
.topnav-tab:hover{color:rgba(255,255,255,.85)}
.topnav-tab.active{color:var(--gold-l);border-bottom-color:var(--gold)}
.topnav-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.topnav-btn{font-size:12px;padding:6px 14px;border-radius:var(--r);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.topnav-btn:hover{background:rgba(255,255,255,.18)}
.topnav-btn.gold{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.topnav-btn.gold:hover{background:var(--gold-l)}

.body-grid{display:grid;grid-template-columns:280px 1fr}
.sidebar{background:var(--parchment-2);border-right:1px solid var(--ink-5);padding:20px 0;height:calc(100vh - 52px);position:sticky;top:52px;overflow-y:auto}
.main-area{padding:28px 32px;min-height:calc(100vh - 52px);max-width:860px}

/* sidebar */
.sb-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4);padding:0 16px;margin-bottom:6px;display:block}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--ink-3);width:100%;text-align:left;border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .12s;border-radius:0}
.sb-item:hover{background:var(--parchment-3);color:var(--ink)}
.sb-item.active{background:var(--gold-pale);color:var(--gold);font-weight:500;border-right:2px solid var(--gold)}
.sb-count{margin-left:auto;font-size:11px;color:var(--ink-5);background:var(--parchment-3);padding:1px 7px;border-radius:99px}
.sb-divider{height:1px;background:var(--ink-5);margin:12px 0}

/* discipline dots */
.disc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.disc-math{background:#534AB7} .disc-sky{background:#0F6E56}
.disc-eng{background:#854F0B} .disc-med{background:#185FA5}
.disc-hum{background:#712B13}

/* ── SEARCH BAR ── */
.search-bar{display:flex;gap:8px;margin-bottom:20px;align-items:center}
.search-input{flex:1;border:1px solid var(--ink-5);border-radius:var(--r);padding:9px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--ink);background:white;transition:border-color .15s}
.search-input:focus{outline:none;border-color:var(--gold)}
.filter-pill{font-size:12px;padding:6px 13px;border-radius:99px;border:1px solid var(--ink-5);background:white;cursor:pointer;color:var(--ink-3);transition:all .12s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.filter-pill:hover{border-color:var(--ink-4);color:var(--ink)}
.filter-pill.on{background:var(--gold-pale);border-color:var(--gold-l);color:var(--gold);font-weight:500}

/* ── TEACHING CARD ── */
.teaching-grid{display:grid;gap:12px}
.t-card{background:white;border:1px solid var(--ink-5);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:border-color .15s}
.t-card:hover{border-color:var(--gold-l)}
.t-card-top{padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.t-card-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.t-card-meta{flex:1;min-width:0}
.t-card-title{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:3px;line-height:1.3}
.t-card-who{font-size:12px;color:var(--ink-4)}
.t-card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid;font-weight:500;white-space:nowrap}
.badge-grade{background:var(--gold-pale);color:var(--gold);border-color:var(--gold-l)}
.badge-subject{background:var(--blue-l);color:var(--blue);border-color:#85B7EB}
.badge-disc-math{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.badge-disc-sky{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.badge-disc-eng{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.badge-disc-med{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.badge-disc-hum{background:#FAECE7;color:#712B13;border-color:#F5C4B3}
.badge-new{background:var(--green-l);color:var(--green);border-color:#97C459}
.badge-scholar{background:var(--parchment-2);color:var(--ink-3);border-color:var(--ink-5)}
.t-card-preview{padding:0 16px 14px;font-size:13px;color:var(--ink-3);line-height:1.65}
.t-card-footer{padding:10px 16px;border-top:1px solid var(--ink-5);background:var(--parchment-2);display:flex;align-items:center;gap:12px}
.t-card-stat{font-size:11px;color:var(--ink-4);display:flex;align-items:center;gap:4px}
.t-card-actions{margin-left:auto;display:flex;gap:6px}
.t-card-btn{font-size:11px;padding:4px 11px;border-radius:var(--r);border:1px solid var(--ink-5);background:white;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink-3);transition:all .12s}
.t-card-btn:hover{background:var(--parchment-2);border-color:var(--ink-4)}
.t-card-btn.primary{background:var(--gold-pale);border-color:var(--gold-l);color:var(--gold)}

/* ── DETAIL VIEW ── */
.detail-back{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-4);cursor:pointer;margin-bottom:18px;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0}
.detail-back:hover{color:var(--ink)}
.detail-header{display:flex;gap:14px;align-items:flex-start;margin-bottom:20px}
.detail-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;flex-shrink:0}
.detail-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink);margin-bottom:4px;line-height:1.2}
.detail-who{font-size:13px;color:var(--ink-4)}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

.detail-section{margin-bottom:22px}
.detail-section-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4);margin-bottom:10px;display:block}
.detail-body{font-size:14px;color:var(--ink-2);line-height:1.8}
.detail-quote{font-family:'DM Serif Display',serif;font-style:italic;font-size:15px;color:var(--ink);border-left:3px solid var(--gold);padding-left:12px;margin:12px 0;line-height:1.6}
.detail-divider{border:none;border-top:1px solid var(--ink-5);margin:18px 0}

/* transcript bubbles */
.transcript{display:grid;gap:8px;margin-top:10px}
.bubble{padding:10px 14px;border-radius:var(--rl);max-width:88%;font-size:13px;line-height:1.65}
.bubble.teacher{background:var(--gold-pale);border:1px solid var(--gold-l);color:var(--ink-2);margin-right:auto}
.bubble.student-q{background:var(--blue-l);border:1px solid #85B7EB;color:var(--blue);margin-left:auto}
.bubble.student-q::before{content:'Student question: ';font-weight:500;display:block;font-size:11px;margin-bottom:3px;opacity:.7}
.bubble.teacher::before{content:'Peer teacher: ';font-weight:500;display:block;font-size:11px;margin-bottom:3px;opacity:.7}
.bubble.unanswered{background:var(--coral-l);border:1px solid #F0997B;color:var(--coral);margin-left:auto}
.bubble.unanswered::before{content:'Unanswered question: ';font-weight:500;display:block;font-size:11px;margin-bottom:3px;opacity:.7}

/* ── RECORD FLOW ── */
.record-steps{display:flex;gap:0;margin-bottom:24px;border-radius:var(--r);overflow:hidden;border:1px solid var(--ink-5)}
.rec-step{flex:1;padding:10px 8px;text-align:center;background:white;border-right:1px solid var(--ink-5);cursor:pointer;transition:all .15s}
.rec-step:last-child{border-right:none}
.rec-step:hover{background:var(--parchment-2)}
.rec-step.active-step{background:var(--gold-pale)}
.rec-step.done-step{background:var(--green-l)}
.rec-step-n{font-size:16px;font-weight:500;color:var(--ink-4)}
.rec-step.active-step .rec-step-n{color:var(--gold)}
.rec-step.done-step .rec-step-n{color:var(--green)}
.rec-step-l{font-size:10px;color:var(--ink-4);line-height:1.3;margin-top:2px}
.rec-step.active-step .rec-step-l{color:var(--gold)}

.form-field{margin-bottom:14px}
.form-label{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-4);margin-bottom:5px;display:block}
input.field,select.field,textarea.field{width:100%;border:1px solid var(--ink-5);border-radius:var(--r);padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--parchment);transition:border-color .15s}
input.field:focus,select.field:focus,textarea.field:focus{outline:none;border-color:var(--gold);background:white}
textarea.field{resize:vertical;line-height:1.65}

/* ── MURSHID PANEL ── */
.murshid-wrap{background:var(--gold-pale);border:1px solid var(--gold-l);border-radius:var(--rl);padding:16px;margin-bottom:16px}
.m-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.m-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:13px;color:var(--parchment);flex-shrink:0}
.m-name{font-size:12px;font-weight:500;color:var(--gold)}
.m-sub{font-size:11px;color:var(--ink-4)}
.m-text{font-family:'DM Serif Display',serif;font-style:italic;font-size:13px;color:var(--ink-2);line-height:1.75}
.dot-pulse{display:flex;gap:4px;align-items:center}
.dot-pulse span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease-in-out infinite}
.dot-pulse span:nth-child(2){animation-delay:.2s} .dot-pulse span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ── MISC ── */
.page-kicker{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4);margin-bottom:4px}
.page-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--ink);font-weight:400;line-height:1.2;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--ink-3);margin-bottom:20px;line-height:1.6}
.page-header{margin-bottom:22px}
.btn{font-size:12px;padding:7px 15px;border-radius:var(--r);border:1px solid var(--ink-5);background:white;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink-3);transition:all .12s}
.btn:hover{background:var(--parchment-2);border-color:var(--ink-4)}
.btn.primary{background:var(--gold-pale);border-color:var(--gold-l);color:var(--gold);font-weight:500}
.btn.primary:hover{background:var(--gold-l)}
.btn.teal{background:var(--teal-l);border-color:var(--teal);color:var(--teal)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.empty-state{text-align:center;padding:48px 24px;color:var(--ink-4)}
.empty-state-icon{font-size:36px;margin-bottom:12px;color:var(--ink-5)}
.empty-state-title{font-size:15px;color:var(--ink-3);margin-bottom:6px}
.empty-state-sub{font-size:13px;line-height:1.6}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:22px}
.stat-card{background:var(--parchment-2);border-radius:var(--r);padding:12px;text-align:center}
.stat-n{font-size:20px;font-weight:500;color:var(--ink);margin-bottom:2px}
.stat-l{font-size:11px;color:var(--ink-4);line-height:1.4}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--parchment);padding:10px 18px;border-radius:var(--r);font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,18,8,.5);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--parchment);border:1px solid var(--ink-5);border-radius:var(--rl);padding:28px;width:480px;max-width:95vw}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:8px}
.modal-sub{font-size:13px;color:var(--ink-3);margin-bottom:18px;line-height:1.6}
.highlight{background:var(--gold-pale);border-left:3px solid var(--gold);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;font-size:13px;color:var(--ink-2);line-height:1.7;margin:12px 0}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="toast" id="toast"></div>



<div class="app">
  <nav class="topnav">
    <span class="topnav-logo">المكتبة</span>
    <div class="topnav-tabs">
      <button class="topnav-tab active" data-tab="browse" onclick="switchTab(this)">Browse library</button>
      <button class="topnav-tab" data-tab="record" onclick="switchTab(this)">Record a teaching</button>
      <button class="topnav-tab" data-tab="mine" onclick="switchTab(this)">My teachings</button>
      <button class="topnav-tab" data-tab="about" onclick="switchTab(this)">How it works</button>
    </div>
    <div class="topnav-right">
      
      <button class="topnav-btn gold" onclick="switchTab(document.querySelector('[data-tab=record]'))">Record teaching +</button>
    </div>
  </nav>

  <div class="body-grid" id="main-body">
    <aside class="sidebar" id="sidebar">
      <div style="padding:0 0 8px">
        <span class="sb-label">Browse by subject</span>
        <button class="sb-item active" data-filter="all" onclick="filterSidebar(this)">
          <span class="disc-dot" style="background:var(--ink-4)"></span>All teachings
          <span class="sb-count" id="count-all">12</span>
        </button>
        <button class="sb-item" data-filter="math" onclick="filterSidebar(this)">
          <span class="disc-dot disc-math"></span>Mathematics
          <span class="sb-count" id="count-math">4</span>
        </button>
        <button class="sb-item" data-filter="science" onclick="filterSidebar(this)">
          <span class="disc-dot disc-sky"></span>Science
          <span class="sb-count" id="count-sci">3</span>
        </button>
        <button class="sb-item" data-filter="history" onclick="filterSidebar(this)">
          <span class="disc-dot disc-eng"></span>Social studies
          <span class="sb-count" id="count-ss">2</span>
        </button>
        <button class="sb-item" data-filter="ela" onclick="filterSidebar(this)">
          <span class="disc-dot disc-hum"></span>ELA / writing
          <span class="sb-count" id="count-ela">2</span>
        </button>
        <button class="sb-item" data-filter="studio" onclick="filterSidebar(this)">
          <span class="disc-dot disc-med"></span>Studio teachings
          <span class="sb-count" id="count-studio">1</span>
        </button>
      </div>

      <div class="sb-divider"></div>

      <div style="padding:0 0 8px">
        <span class="sb-label">Browse by grade taught</span>
        <button class="sb-item" data-gradefilter="0" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">K</span>Kindergarten</button>
        <button class="sb-item" data-gradefilter="1" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G1</span>Grade 1</button>
        <button class="sb-item" data-gradefilter="2" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G2</span>Grade 2</button>
        <button class="sb-item" data-gradefilter="3" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G3</span>Grade 3</button>
        <button class="sb-item" data-gradefilter="4" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G4</span>Grade 4</button>
        <button class="sb-item" data-gradefilter="5" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G5</span>Grade 5</button>
        <button class="sb-item" data-gradefilter="6" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G6</span>Grade 6</button>
        <button class="sb-item" data-gradefilter="7" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G7</span>Grade 7</button>
        <button class="sb-item" data-gradefilter="8" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G8</span>Grade 8</button>
        <button class="sb-item" data-gradefilter="9" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G9</span>Grade 9</button>
        <button class="sb-item" data-gradefilter="10" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G10</span>Grade 10</button>
        <button class="sb-item" data-gradefilter="11" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G11</span>Grade 11</button>
        <button class="sb-item" data-gradefilter="12" onclick="filterGrade(this)"><span style="font-size:12px;color:var(--ink-4);width:22px">G12</span>Grade 12</button>
      </div>

      <div class="sb-divider"></div>

      <div style="padding:0 16px 12px">
        <span class="sb-label" style="margin-bottom:8px">My stats</span>
        <p style="font-size:12px;color:var(--ink-3);line-height:1.7">
          Teachings recorded: <strong id="my-count">0</strong><br>
          Students helped: <strong id="my-helped">—</strong><br>
          Isnad links: <strong id="my-links">—</strong>
        </p>
      </div>
    </aside>

    <main id="tab-content" class="main-area"></main>
  </div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────────────────────────
const S = {
  get(k){try{return JSON.parse(localStorage.getItem('ptl_'+k))}catch{return null}},
  set(k,v){localStorage.setItem('ptl_'+k,JSON.stringify(v))},
};
function getTeachings(){return S.get('teachings')||[]}

// ── Delete a teaching (local + Supabase) ─────────────────────────────────
async function deleteTeaching(id, evt){
  if(evt){ evt.stopPropagation(); }
  if(!confirm('Delete this teaching? This cannot be undone.')) return;

  // Remove from localStorage
  var teachings = getTeachings().filter(function(t){ return t.id !== id; });
  saveTeachings(teachings);

  // Remove from Supabase only if id is a real UUID (not a local lg/teach_ id)
  var isUUID = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/.test(id);
  if(isUUID){
    try{
      var jwt = localStorage.getItem('how_jwt');
      if(jwt && typeof sb !== 'undefined'){
        var { error } = await sb.from('teaching').delete().eq('id', id);
        if(error) console.warn('Supabase delete failed:', error.message);
        else console.log('Supabase delete OK:', id);
      }
    }catch(e){ console.warn('deleteTeaching error:', e); }
  }

  renderTab(currentView||'mine');
  toast('Teaching deleted');
}

// ── Publish / unpublish a teaching ───────────────────────────────────────
async function togglePublish(id, currentState, evt){
  if(evt){ evt.stopPropagation(); }
  var newState = !currentState;

  // Update localStorage
  var teachings = getTeachings().map(function(t){
    return t.id === id ? Object.assign({}, t, {is_published: newState}) : t;
  });
  saveTeachings(teachings);

  // Update Supabase only if id is a real UUID
  var isUUID2 = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/.test(id);
  var serverOK = false, serverWhy = '';
  if(isUUID2){
    try{
      var jwt = localStorage.getItem('how_jwt');
      if(!sb) serverWhy = 'Supabase client did not load';
      else if(!jwt) serverWhy = 'not signed in on the platform in this browser';
      else{
        var { error } = await sb
          .from('teaching')
          .update({ is_published: newState })
          .eq('id', id);
        if(error) serverWhy = error.message||'server error';
        else serverOK = true;
      }
    }catch(e){ serverWhy = e.message||'network error'; }
  } else if(newState){
    // Local-only teaching being published for the first time → insert it now
    var localT = getTeachings().find(function(t){ return t.id===id; });
    if(localT){
      var res = await pushTeachingToSupabase(localT);
      if(res && res.id){
        var list = getTeachings().map(function(t){ return t.id===id ? Object.assign({},t,{id:res.id, fromSupabase:true}) : t; });
        saveTeachings(list);
        serverOK = true;
      } else serverWhy = (res&&res.reason)||'could not reach the shared table';
    }
  }

  renderTab(currentView||'mine');
  if(newState){
    toast(serverOK ? '✓ Published to the shared library' : '⚠ Published on this device only — '+(serverWhy||'no server connection'), serverOK?2600:5000);
  } else {
    toast(serverOK||!isUUID2 ? 'Unpublished — visible to you only' : '⚠ Unpublished locally, but the server still shows it: '+serverWhy, 4000);
  }
}

function switchTab(btn){
  document.querySelectorAll('.topnav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentView = btn.dataset.tab;
  const sidebar = document.getElementById('sidebar');
  const body    = document.getElementById('main-body');
  const hasSidebar = ['browse','mine'].includes(currentView);
  sidebar.style.display = hasSidebar ? 'block' : 'none';
  body.style.gridTemplateColumns = hasSidebar ? '280px 1fr' : '1fr';
  renderTab(currentView);

  const mc = document.getElementById('tab-content');
  if(tab==='browse') renderBrowse(mc, currentFilter, currentGradeFilter, null);
  else if(tab==='record') renderRecord(mc);
  else if(tab==='mine') renderMine(mc);
  else if(tab==='about') renderAbout(mc);
}

function renderBrowse(mc, filter, gradeFilter, searchTerm){

    else teachings = teachings.filter(t=>t.subject===filter);
  }
  if(gradeFilter) teachings = teachings.filter(t=>parseInt(t.taughtGrade)===gradeFilter);
  if(searchTerm) {
    const s = searchTerm.toLowerCase();
    teachings = teachings.filter(t=>
      t.title.toLowerCase().includes(s)||
      t.summary.toLowerCase().includes(s)||
      t.keyIdea.toLowerCase().includes(s)||
      (t.tags&&t.tags.some(tag=>tag.toLowerCase().includes(s)))||
      (t.scholar&&t.scholar.toLowerCase().includes(s))

  mc.innerHTML = `

// VERIFY LEARNING — the digital samāʿ certificate
// The learner attests reception in writing; the Murshid checks the
// reflection actually engages the content (ḍabṭ); the platform then
// seals the transmission in `transmission_verification`.
// ══════════════════════════════════════════════════════════════════════
function escV(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function getLearnerIdentity(){
  var name='';
  try{ var a=JSON.parse(localStorage.getItem('how_active_student')||'null'); if(a&&a.name) name=a.name; }catch(e){}
  if(!name){ try{ var ss=JSON.parse(localStorage.getItem('sahifa_settings')||'{}'); if(ss.name) name=ss.name; }catch(e){} }
  if(!name){ var s=getSettings(); if(s.name) name=s.name; }
  var grade='';
  try{ var ss2=JSON.parse(localStorage.getItem('sahifa_settings')||'{}'); grade=ss2.grade||''; }catch(e){}
  return {
    name: name,
    grade: grade,
    jwt: localStorage.getItem('how_jwt'),
    hid: localStorage.getItem('how_household_id'),
    studentId: (function(){ try{ var a=JSON.parse(localStorage.getItem('how_active_student')||'null'); return a?a.id:null; }catch(e){ return null; } })()
  };
}

// Murshid ḍabṭ (precision) check — does the reflection show the content was
// actually received? Fails open on network error (facilitator retains override).
async function dabtCheck(t, reflection){
  try{
    const resp = await fetch('https://how-proxy-production.up.railway.app/api/generate',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:150,
        system:'You check whether a student\'s written reflection shows they genuinely received a peer teaching (dabt — precision of retention). PASS if the reflection engages the actual content: names the key idea, explains it in their own words, applies it, or asks a real question about it. FAIL if it is generic praise ("it was good", "I learned a lot") or could have been written without reading the teaching. Be generous with young students — simple language is fine as long as it is specific. Respond ONLY with JSON: {"pass":true|false,"note":"if fail, one short encouraging pointer toward what to add"}',
        messages:[{role:'user',content:'TEACHING: "'+t.title+'"\nKey idea: '+(t.keyIdea||'')+'\nSummary: '+(t.summary||'')+'\n\nSTUDENT REFLECTION:\n'+reflection+'\n\nJSON verdict:'}]})
    });
    const d = await resp.json();
    const raw = (d.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    const v = JSON.parse(raw);
    return { pass: !!v.pass, note: v.note||'', via:'murshid' };
  }catch(e){
    return { pass:true, note:'', via:'platform' };
  }
}

function verifyPanelHtml(t){
  // Example (seed) teachings cannot be attested — no real transmission occurred
  if(t.isExample) return '';
  const me = getLearnerIdentity();
  const isOwn = me.name && t.teacherName && me.name.trim().toLowerCase()===t.teacherName.trim().toLowerCase();
  if(isOwn) return '';
  return `
  <hr style="border:none;border-top:1px solid var(--ink-5);margin:18px 0">
  <div class="detail-section" id="verify-panel">
    <span class="detail-section-label">🖋 Verify what you learned — your samāʿ</span>
    <p style="font-size:12.5px;color:var(--ink-3);line-height:1.7;margin:0 0 10px">In the manuscript tradition, a <em>samāʿ</em> certificate recorded who received a text and attested it in writing. Write what you learned from ${escV(t.teacherName||'this teacher')} — be specific about the idea itself. This becomes an entry in your sahifa and seals the transmission on the Isnād Map.</p>
    <input id="verify-name" value="${escV(me.name)}" placeholder="Your name" style="width:100%;box-sizing:border-box;border:1px solid var(--ink-5);border-radius:8px;padding:8px 11px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--paper,#fff);margin-bottom:8px">
    <textarea id="verify-text" rows="4" placeholder="What I learned: … The key insight was… I could now explain it as…" style="width:100%;box-sizing:border-box;border:1px solid var(--ink-5);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--paper,#fff);line-height:1.6"></textarea>
    <div id="verify-status" style="margin-top:8px"></div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn primary" id="verify-btn" onclick="submitLearningVerification('${escV(t.id)}')">Record my learning →</button>
    </div>
  </div>`;
}

async function submitLearningVerification(teachingId){
  const t = getAllTeachings().find(x=>x.id===teachingId);
  if(!t) return;
  const nameEl = document.getElementById('verify-name');
  const txtEl  = document.getElementById('verify-text');
  const statusEl = document.getElementById('verify-status');
  const btn = document.getElementById('verify-btn');
  const learner = (nameEl?.value||'').trim();
  const txt = (txtEl?.value||'').trim();

  const coral = m=>`<div style="background:var(--coral-l,#FAECE7);border:1px solid var(--coral,#C4552E);border-radius:8px;padding:9px 12px;font-size:12.5px;color:var(--ink-2);line-height:1.6">${m}</div>`;
  if(!learner){ statusEl.innerHTML = coral('Add your name so the chain records who received this.'); return; }
  if(t.teacherName && learner.toLowerCase()===t.teacherName.trim().toLowerCase()){
    statusEl.innerHTML = coral('A teacher can\'t verify their own transmission — that\'s for the one who received it.'); return;
  }
  if(txt.length < 25){
    statusEl.innerHTML = coral('<strong>Say more about what you learned</strong> — mention the actual idea. What was the key insight? How would you explain it to someone else?'); return;
  }

  if(btn) btn.disabled = true;
  statusEl.innerHTML = `<div style="font-size:12.5px;color:var(--ink-4)"><em>The Murshid is reading your reflection…</em></div>`;

  const verdict = await dabtCheck(t, txt);
  if(!verdict.pass){
    if(btn) btn.disabled = false;
    statusEl.innerHTML = coral('<strong>Say more about what you learned.</strong> '+escV(verdict.note||'Mention the specific idea — what was the key insight, and how would you explain it to someone else?'));
    return;
  }

  const me = getLearnerIdentity();
  const entryText = 'What I learned from '+(t.teacherName||'a peer')+' — "'+t.title+'": '+txt;

  // 1) Sahifa entry — local (the sahifa app and Murshid read this key)
  try{
    var entries = JSON.parse(localStorage.getItem('sahifa_entries')||'[]');
    entries.unshift({ id:'pl'+Date.now(), type:'peer_learning', text:entryText, date:new Date().toISOString(),
                      teachingId:t.id, teacherName:t.teacherName||'' });
    localStorage.setItem('sahifa_entries', JSON.stringify(entries.slice(0,500)));
  }catch(e){}

  // 2) Sahifa entry — Supabase (best-effort)
  if(sb && me.jwt && me.hid){
    try{
      await sb.from('sahifa_entry').insert({
        household_id: me.hid, student_id: me.studentId, type:'peer_learning',
        text: entryText, grade: parseInt(me.grade,10)||null,
        entry_date: new Date().toISOString().split('T')[0]
      });
    }catch(e){ console.warn('sahifa_entry insert failed:', e.message||e); }
  }

  // 3) Seal the transmission
  var sealed = false;
  if(sb && me.jwt){
    try{
      // v2: resolve person UUIDs for authoritative identity on the Isnād Map
      var learnerGrade = parseInt(me.grade, 10) || null;
      var fromPersonId = await findOrCreatePerson(t.teacherName||'Unknown teacher', null, 'student');
      var toPersonId   = await findOrCreatePerson(learner, learnerGrade, 'student');
      // Curriculum week from sahifa_settings (written by platform on each week view)
      var currentWeek  = null;
      try{ var sq=JSON.parse(localStorage.getItem('sahifa_settings')||'{}'); currentWeek=parseInt(sq.juz)||null; }catch(e){}
      var row = {
        household_id:       me.hid||null,
        kind:               'reception',
        teaching_id:        (t.fromSupabase && /^[0-9a-f-]{36}$/.test(t.id)) ? t.id : null,
        from_name:          t.teacherName||'Unknown teacher',  // v1: kept
        to_name:            learner,                           // v1: kept
        from_person_id:     fromPersonId,                      // v2
        to_person_id:       toPersonId,                        // v2
        evidence:           txt,
        evidence_ref:       t.title,
        week:               currentWeek,                       // v2
        grade:              learnerGrade,                      // v2
        status:             'verified',
        verified_by:        verdict.via,
        verification_level: verdict.via === 'murshid' ? 'murshid_checked' : 'platform_auto'  // v2
      };
      var r = await sb.from('transmission_verification').insert(row);
      if(r.error) throw r.error;
      sealed = true;
    }catch(e){
      console.warn('verification insert failed:', e.message||e);
      toast('⚠ Reflection saved, but the seal did not reach the Isnād Map: '+(e.message||'server error'), 5000);
    }
  }

  const panel = document.getElementById('verify-panel');
  if(panel) panel.innerHTML = `
    <span class="detail-section-label">🖋 Samāʿ recorded</span>
    <div style="background:var(--gold-pale,#FAEEDA);border:1px solid var(--gold,#B98A2F);border-radius:10px;padding:14px 16px">
      <p style="font-size:13.5px;font-weight:600;color:var(--ink);margin:0 0 6px">✓ Transmission ${sealed?'verified':'recorded'} — ${escV(t.teacherName||'teacher')} → ${escV(learner)}</p>
      <p style="font-size:12.5px;color:var(--ink-2);line-height:1.7;margin:0 0 8px">"${escV(txt)}"</p>
      <p style="font-size:11.5px;color:var(--ink-4);line-height:1.6;margin:0">Saved to your sahifa${sealed?' and sealed on the Isnād Map. This link is now <em>muttaṣil</em> — attested by the one who received it.':'. Sign in on the platform to seal it on the Isnād Map.'}</p>
    </div>`;
  toast(sealed ? 'Transmission verified ✓' : 'Learning recorded ✓');
}

// If this learner already verified this teaching, show that instead of the form
async function checkExistingVerification(t){
  const me = getLearnerIdentity();
  if(!sb || !me.jwt || !me.name || !t.fromSupabase) return;
  try{
    var r = await sb.from('transmission_verification').select('created_at,evidence')
      .eq('teaching_id', t.id).eq('to_name', me.name).eq('kind','reception').limit(1);
    if(r.data && r.data.length){
      const panel = document.getElementById('verify-panel');
      if(panel) panel.innerHTML = `
        <span class="detail-section-label">🖋 Samāʿ recorded</span>
        <div style="background:var(--gold-pale,#FAEEDA);border:1px solid var(--gold,#B98A2F);border-radius:10px;padding:12px 16px">
          <p style="font-size:13px;font-weight:600;color:var(--ink);margin:0 0 4px">✓ You verified this transmission on ${new Date(r.data[0].created_at).toLocaleDateString()}</p>
          <p style="font-size:12.5px;color:var(--ink-2);line-height:1.6;margin:0">"${escV(r.data[0].evidence||'')}"</p>
        </div>`;
    }
  }catch(e){}
}

async function prepareMurshid(){
  const s = getSettings();
  const el = document.getElementById('murshid-prep-text');
  if(!el) return;
  if(!s.apiKey){
    setTimeout(()=>{
      if(!el) return;
      el.innerHTML = `Before you write your summary — what is the one thing that, once a student understands it, makes the whole concept click? Not the definition. The insight. For "${draftTeaching.title}", that moment is usually hiding in the question: what were people confused about before this idea existed?`;
    }, 800);
    return;
  }
  try {
    const resp = await fetch('https://how-proxy-production.up.railway.app/api/generate',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,
        system:'You are the Murshid. A student is about to record a peer teaching. Help them find their key insight. Ask one precise question that will help them articulate the single most important idea. Be brief — two or three sentences maximum.',

    });
    const data = await resp.json();
    if(el) el.textContent = data.content?.[0]?.text || 'What is the one insight that made this concept click?';
  } catch(e){
    if(el) el.textContent = 'What is the one sentence that unlocks this concept for a younger student?';
  }
}

function transcriptLine(line, idx){

async function publishTeaching(){
  const s = getSettings();
  const teachings = getTeachings();
  const name = s.name||'Anonymous';
  const initials = name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'??';
  const entry = {
    ...draftTeaching,
    id: 'u'+Date.now(),
    teacherName: name,
    teacherInitials: initials,
    year: new Date().getFullYear().toString(),
    views: 0,
    helpful: 0,
    is_published: true,
  };
  teachings.push(entry);
  saveTeachings(teachings);
  switchTab(document.querySelector('[data-tab=browse]'));
  // Push to the shared table so the Map and other devices can see it.
  const shared = await pushTeachingToSupabase(entry);
  if(shared && shared.id){
    // Adopt the server uuid so future publish-toggles update the real row
    var list = getTeachings().map(function(t){ return t.id===entry.id ? Object.assign({},t,{id:shared.id, fromSupabase:true}) : t; });
    saveTeachings(list);
    toast('✓ Published to the shared library — it can now be verified on the Isnād Map.');
  } else {
    toast('⚠ Saved on this device only — NOT shared. '+(shared&&shared.reason?shared.reason:'Check connection and platform sign-in.'), 5000);
  }
}

// Insert a locally-recorded teaching into the shared `teaching` table.
// Returns {id} on success, {reason} on failure — never silent.
async function pushTeachingToSupabase(t){
  if(!sb) return { reason:'Supabase client did not load in this tab.' };
  var jwt = localStorage.getItem('how_jwt');
  if(!jwt) return { reason:'Not signed in on the platform in this browser.' };
  var hid = localStorage.getItem('how_household_id');
  var sid = null;
  try{ var a=JSON.parse(localStorage.getItem('how_active_student')||'null'); sid=a?a.id:null; }catch(e){}
  // v2: resolve teacher_id from the person table
  var teacherName = t.teacherName || 'Anonymous';
  var teacherGrade = parseInt(t.teacherGrade, 10) || null;
  var teacherId = await findOrCreatePerson(teacherName, teacherGrade, 'student');
  var row = {
    household_id: hid||null,
    teacher_name: teacherName,          // v1: kept for backward compat
    teacher_id:   teacherId,            // v2: FK to person
    student_id: sid,
    taught_grade: parseInt(t.taughtGrade,10)||parseInt(t.grade,10)||parseInt((getSettings()||{}).grade,10)||null,
    subject: t.subject||'other',
    title: t.title||'Untitled teaching',
    is_published: true
  };
  try{
    var r = await sb.from('teaching').insert(row).select().single();
    if(r.error){
      // Retry without household_id in case the column/policy differs
      delete row.household_id;
      r = await sb.from('teaching').insert(row).select().single();
    }
    if(r.error) return { reason:'Server rejected it: '+(r.error.message||'unknown error') };
    return { id: r.data.id };
  }catch(e){
    return { reason:'Network error: '+(e.message||'could not reach Supabase') };
  }
}

function renderAnnotatedDeck(t){
  const slides = t.annotatedSlides || [];
  if(!slides.length) return '<p style="color:#888;font-size:13px;padding:12px 0">No slide annotations saved.</p>';

  // Store on window for navigation
  window._libDeck = window._libDeck || {};
  window._libDeck[t.id] = { slides, idx: 0 };

  return `
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span id="slide-ctr-${t.id}" style="font-size:12px;color:#888">Slide 1 of ${slides.length}</span>
        <div style="display:flex;gap:8px">
          <button onclick="libSlideNav('${t.id}',-1)"
            style="background:var(--teal,#1d6f6f);color:white;border:none;border-radius:6px;padding:4px 16px;cursor:pointer;font-size:15px;font-weight:700">←</button>
          <button onclick="libSlideNav('${t.id}',1)"
            style="background:var(--teal,#1d6f6f);color:white;border:none;border-radius:6px;padding:4px 16px;cursor:pointer;font-size:15px;font-weight:700">→</button>
        </div>
      </div>
      <div id="slide-view-${t.id}"
        style="background:#faf8f4;border:1px solid #e4ddd0;border-radius:10px;padding:18px;min-height:180px">
        ${renderOneAnnotatedSlide(slides[0], 0)}
      </div>
    </div>`;
}

function renderOneAnnotatedSlide(sl, idx){
  if(!sl) return '';
  let html = '';
  html += `<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:6px">Slide ${idx+1} · ${sl.type||'content'}</div>`;
  if(sl.heading) html += `<div style="font-size:1rem;font-weight:700;color:#1a1a2e;margin-bottom:6px">${sl.heading}</div>`;
  if(sl.content) html += `<div style="font-size:.85rem;color:#5a5a78;margin-bottom:10px;line-height:1.55">${sl.content}</div>`;
  if(sl.drawing && sl.drawing.length > 100){
    html += `<img src="${sl.drawing}" style="max-width:100%;border-radius:6px;border:1px solid #e4ddd0;margin-bottom:10px;display:block" alt="Student drawing">`;
  }
  if(sl.studentNote && sl.studentNote.trim()){
    html += `<div style="background:#f0f8f8;border-left:3px solid #1d6f6f;padding:10px 12px;border-radius:0 6px 6px 0">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#1d6f6f;margin-bottom:4px">Teaching note</div>
      <div style="font-size:.88rem;color:#1a1a2e;line-height:1.6">${sl.studentNote}</div>
    </div>`;
  }
  if(!sl.drawing && !sl.studentNote){
    html += `<div style="color:#ccc;font-size:.82rem;font-style:italic;padding:12px 0">No annotation on this slide</div>`;
  }
  return html;
}

function libSlideNav(id, dir){
  const state = (window._libDeck||{})[id];
  if(!state) return;
  state.idx = Math.max(0, Math.min(state.slides.length-1, state.idx+dir));
  const view = document.getElementById('slide-view-'+id);
  const ctr  = document.getElementById('slide-ctr-'+id);
  if(view) view.innerHTML = renderOneAnnotatedSlide(state.slides[state.idx], state.idx);
  if(ctr)  ctr.textContent = 'Slide '+(state.idx+1)+' of '+state.slides.length;
}

// ── PERSON HELPER (v2 schema) ─────────────────────────────────────────────
// Looks up a person row by (household_id, name); creates one if missing.
// Returns the UUID, or null if Supabase is unavailable.
// Safe to call multiple times — the UNIQUE INDEX on (household_id, name)
// ensures no duplicates even if two tabs race.
async function findOrCreatePerson(name, grade, role) {
  if (!sb || !localStorage.getItem('how_jwt')) return null;
  var hid = localStorage.getItem('how_household_id');
  if (!hid || !name) return null;
  try {
    // Try to find existing person first
    var found = await sb.from('person')
      .select('id')
      .eq('household_id', hid)
      .eq('name', name.trim())
      .limit(1);
    if (found.data && found.data.length) return found.data[0].id;
    // Not found — insert
    var created = await sb.from('person').insert({
      household_id: hid,
      name: name.trim(),
      grade: grade || null,
      role: role || 'student'
    }).select('id').single();
    if (created.data) return created.data.id;
  } catch(e) {
    // Conflict on unique index means another tab just inserted — re-fetch
    try {
      var retry = await sb.from('person')
        .select('id')
        .eq('household_id', hid)
        .eq('name', name.trim())
        .limit(1);
      if (retry.data && retry.data.length) return retry.data[0].id;
    } catch(e2) {}
  }
  return null;
}

// ── Fetch published teachings from Supabase and merge with local ──────────
async function fetchSupabaseTeachings(){
  try{
    const { data, error } = await sb
      .from('teaching')
      .select('*')
      .eq('is_published', true)
      .order('created_at', { ascending: false });

    if(error){ console.warn('Supabase fetch failed:', error.message); return []; }
    if(!data || !data.length) return [];

    // Map Supabase row format → ptl format
    return data.map(function(r){
      return {
        id:             r.id,
        title:          r.title || '',
        teacherGrade:   String(r.taught_grade || ''),
        taughtGrade:    String(r.taught_grade || ''),
        subject:        r.subject || '',
        disc:           ({math:'math',science:'sky',social:'eng',ela:'hum',writing:'hum'})[r.subject] || 'hum',
        juz:            '',
        scholar:        '',
        keyIdea:        r.key_idea || '',
        summary:        r.summary || '',
        transcript:     Array.isArray(r.transcript) ? r.transcript : [],
        openQuestion:   '',
        tags:           Array.isArray(r.tags) ? r.tags : [],
        teacherName:    r.teacher_name || '',
        teacherInitials:(r.teacher_name||'??').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase(),
        year:           new Date(r.created_at).getFullYear().toString(),
        views:          0,
        helpful:        r.helpful || 0,
        isTeachIt:      !!r.student_id,
        fromSupabase:   true
      };
    });
  }catch(e){
    console.warn('fetchSupabaseTeachings error:', e);
    return [];
  }
}

// ── Fetch public debates from Supabase ───────────────────────────────────
async function fetchSupabaseDebates(){
  try{
    const { data, error } = await sb
      .from('debate')
      .select('*')
      .eq('is_public', true)
      .eq('status', 'complete')
      .order('updated_at', { ascending: false });
    if(error){ console.warn('fetchSupabaseDebates error:', error.message); return []; }
    if(!data || !data.length) return [];
    return data.map(function(r){
      var moves = Array.isArray(r.moves)?r.moves:[];
      var transcript = moves.map(function(m){
        return (m.who==='a'?(r.student_a_name||'Student A'):
                m.who==='b'?(r.student_b_name||'Student B'):'Ustadh')
               +': '+m.text;
      }).join('\n\n');
      var synth = '';
      try{ var s=JSON.parse(r.synthesis||'{}'); synth=s.verdict||s.summary||''; }catch(e){}
      return {
        id:             r.id,
        title:          r.claim,
        teacherGrade:   String(r.grade||''),
        taughtGrade:    String(r.grade||''),
        subject:        'munazara',
        disc:           'hum',
        juz:            'Week '+r.week,
        scholar:        '',
        keyIdea:        r.claim,
        summary:        synth||(moves.length?moves[0].text.slice(0,120)+'…':''),
        transcript:     [{type:'debate',text:transcript}],
        openQuestion:   '',
        tags:           ['Munazara','Week '+(r.week||''), 'Grade '+(r.grade||'')],
        teacherName:    (r.student_a_name||'')+(r.student_b_name?' vs '+r.student_b_name:''),
        teacherInitials:'⚔',
        year:           new Date(r.created_at||Date.now()).getFullYear().toString(),
        views:          0,
        helpful:        r.helpful||0,
        isMunazara:     true,
        fromServer:     true
      };
    });
  }catch(e){
    console.warn('fetchSupabaseDebates error:', e);
    return [];
  }
}

// ── Connection status: silent degradation is how bugs hide. Announce it. ──
function announceConnectionState(){
  if(!sb){
    toast('⚠ Offline mode — the Supabase client did not load. Sharing, samāʿ verification and sahifa sync are disabled in this tab.', 6000);
    return;
  }
  if(!localStorage.getItem('how_jwt')){
    toast('⚠ Not signed in on the platform in this browser — teachings will save locally but will NOT share, seal, or sync until you sign in.', 6000);
  }
}

// ── Load on startup: fetch Supabase + merge with local + re-render ────────
(async function initLibrary(){
  setTimeout(announceConnectionState, 1200);
  updateIsnadStats();
  var sbTeachings = await fetchSupabaseTeachings();
  var sbDebates   = await fetchSupabaseDebates();
  var allServer   = sbTeachings.concat(sbDebates);
  if(!allServer.length) return; // nothing to merge

  // Merge: Supabase teachings first, then local (local may have unpublished)
  var local = getTeachings();
  var localIds = new Set(local.map(function(t){ return t.id; }));

  // Add Supabase teachings not already in local
  var merged = local.concat(
    allServer.filter(function(t){ return !localIds.has(t.id); })
  );

  saveTeachings(merged);

  // Re-render current tab with merged data
  if(typeof renderTab === 'function') renderTab(currentView || 'browse');
})();
