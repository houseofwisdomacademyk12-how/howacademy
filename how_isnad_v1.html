  return '<svg '+s+'><path d="M10 16.5s-5.5-3.4-5.5-7.3C4.5 7 6 5.8 7.6 5.8c1.1 0 1.9.6 2.4 1.5.5-.9 1.3-1.5 2.4-1.5 1.6 0 3.1 1.2 3.1 3.4 0 3.9-5.5 7.3-5.5 7.3z" fill="#b0394a"></path></svg>';
}
var STAR_SVG = '<svg width="14" height="14" viewBox="0 0 20 20"><path d="M10 1.5l2 4.6 5 .4-3.8 3.3 1.2 4.9L10 12.1 5.4 14.7 6.6 9.8 2.8 6.5l5-.4z" fill="#e0a92e"></path></svg>';

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
var _people = [];      // { id, name, grade (label), band, subject, source, x, y }
var _links  = [];      // { from, to, mode }
var _map    = {};
var _hover  = null, _pin = null, _modeFilter = null;
var _edits  = { names:{}, subjects:{}, studio:{}, adab:{}, transmit:{}, extra:{ learned:{}, taught:{} } };

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escJs(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── Edits (saved locally, KTC shape) ─────────────────────────
function loadEdits(){
  try{
    var raw = localStorage.getItem(STORE);
    if(raw){
      var d = JSON.parse(raw), ex = d.extra||{};
      _edits = { names:d.names||{}, subjects:d.subjects||{}, studio:d.studio||{}, adab:d.adab||{},
                 transmit:d.transmit||{}, extra:{ learned:ex.learned||{}, taught:ex.taught||{} } };
    }
  }catch(e){}
}
function saveEdits(){ try{ localStorage.setItem(STORE, JSON.stringify(_edits)); }catch(e){} }
function setEdit(group, key, val){
  _edits[group][key] = val;
  saveEdits();
}
function getName(id){ return Object.prototype.hasOwnProperty.call(_edits.names,id) ? _edits.names[id] : (_map[id]?_map[id].name:id); }
function getSubject(id){ return Object.prototype.hasOwnProperty.call(_edits.subjects,id) ? _edits.subjects[id] : ((_map[id]&&_map[id].subject)||'math'); }
function getStudio(id){ return _edits.studio[id]||''; }
function getExtra(dir,id){ return (_edits.extra[dir] && _edits.extra[dir][id]) || []; }
function updateExtra(dir,id,fn){
  var list = getExtra(dir,id).map(function(x){ return { name:x.name, note:x.note, mode:x.mode }; });
  fn(list);
  if(!_edits.extra[dir]) _edits.extra[dir]={};
  _edits.extra[dir][id]=list;
  saveEdits();
}
function addExtra(dir,id){ updateExtra(dir,id,function(l){ l.push({name:'',note:'',mode:dir==='learned'?'facilitator':'peer'}); }); renderAll(); }
function setExtra(dir,id,idx,field,val){ updateExtra(dir,id,function(l){ if(l[idx]) l[idx][field]=val; }); }
function removeExtra(dir,id,idx){ updateExtra(dir,id,function(l){ l.splice(idx,1); }); renderAll(); }
function cycleExtra(dir,id,idx){
  var order=['facilitator','parent','peer'];
  updateExtra(dir,id,function(l){ if(l[idx]){ var i=order.indexOf(l[idx].mode||'peer'); l[idx].mode=order[(i+1)%3]; } });
  renderAll();
}

// ══════════════════════════════════════════════════════════════
// BACKEND — load published teachings + completed public debates
// ══════════════════════════════════════════════════════════════
function normSubj(s){
  s = String(s||'math').toLowerCase().replace(/[^a-z]/g,'');
  if(SUBJ[s]) return s;
  if(SUBJ_ALIAS[s]) return SUBJ_ALIAS[s];
  return 'math';
}
function bandForGrade(g){
  var n = parseInt(g,10);
  if(isNaN(n)) return 2;               // unknown grade → middle band
  if(n>=9) return 1;
  if(n>=6) return 2;
  if(n>=3) return 3;
  return 4;                             // K–2
}
function gradeLabel(g){
  if(g===0||g==='0'||String(g).toUpperCase()==='K') return 'Kindergarten';
  var n=parseInt(g,10);
  return isNaN(n)?'':('Grade '+n);
}

async function loadData(){
  var status = document.getElementById('nav-status');
  if(!sb){
    loadLocalFallback();
    status.textContent = 'Offline — showing local records';
    return;
  }
  var jwt = localStorage.getItem('how_jwt');
  if(!jwt){
    loadLocalFallback();
    status.textContent = 'Sign in to see the full network';
    return;
  }
  try{
    var res = await Promise.all([
      sb.from('teaching').select('*').eq('is_published',true).order('created_at',{ascending:true}),
      sb.from('debate').select('*').eq('is_public',true).eq('status','complete').order('updated_at',{ascending:true}),
      sb.from('transmission_verification').select('*').eq('status','verified').order('created_at',{ascending:true})
    ]);
    buildGraph(res[0].data||[], res[1].data||[], (res[2]&&res[2].data)||[]);
  }catch(e){
    document.getElementById('stage-message').innerHTML = '⚠ '+esc(e.message||'Could not load the network');
    status.textContent = 'Connection error';
  }
}

function loadLocalFallback(){
  var teachings = [];
  try{
    var ptl = JSON.parse(localStorage.getItem('ptl_teachings')||'[]');
    teachings = ptl.filter(function(t){ return t.isTeachIt||t.fromSupabase; }).map(function(t){
      return { id:t.id, teacher_name:t.teacherName||'Student', taught_grade:parseInt(t.taughtGrade)||7,
               subject:(t.subject||'math').toLowerCase(), title:t.title||'', student_id:t.id };
    });
  }catch(e){}
  buildGraph(teachings, []);
}

// ══════════════════════════════════════════════════════════════
// GRAPH BUILD  (backend records → KTC people cards + links)
// ══════════════════════════════════════════════════════════════
function buildGraph(teachings, debates, verifications){
  loadEdits();
  _people=[]; _links=[]; _map={};
  verifications = verifications||[];

  function person(id, name, grade, band, subject, source){
    if(!_map[id]){
      _map[id] = { id:id, name:name, grade:grade, band:band, subject:subject||'math', source:!!source, x:0, y:0 };
      _people.push(_map[id]);
    }
    return _map[id];
  }
  function slug(n){ return 'p_'+String(n||'').toLowerCase().replace(/\W+/g,'_'); }
  function addLink(from, to, mode){
    var ex=null;
    for(var i=0;i<_links.length;i++){ if(_links[i].from===from && _links[i].to===to){ ex=_links[i]; break; } }
    if(!ex){ ex={ from:from, to:to, mode:mode }; _links.push(ex); }
    return ex;
  }

  var teachingLink = {};  // teaching row id → {teacherId, subjId}

  teachings.forEach(function(t){
    var tName = t.teacher_name || (t.student_id ? 'Student' : 'Facilitator');
    var tId   = slug(tName);
    var subj  = normSubj(t.subject);
    var isFac = !t.student_id;
    var g     = t.taught_grade;
    var sId   = 'subj_'+subj+'_g'+(g||'');
    var sName = SUBJ[subj].label + (g!=null && g!=='' ? ' · G'+g : '');
    var mode  = isFac ? 'facilitator' : 'peer';

    person(tId, tName, isFac?'Facilitator':'Student', isFac?0:2, subj, isFac);
    var tgt = person(sId, sName, gradeLabel(g), bandForGrade(g), subj, false);
    tgt.isGroup = true;
    addLink(tId, sId, mode);
    if(t.id) teachingLink[t.id] = { teacherId:tId, subjId:sId, subject:subj };
  });

  debates.forEach(function(d){
    if(!d.student_a_name && !d.student_b_name) return;
    var aId=slug(d.student_a_name||'A');
    var bId=slug(d.student_b_name||'B');
    person(aId, d.student_a_name||'Student A', gradeLabel(d.grade)||'Student', bandForGrade(d.grade), 'reading', false);
    person(bId, d.student_b_name||'Student B', gradeLabel(d.grade)||'Student', bandForGrade(d.grade), 'reading', false);
    if(!_links.some(function(l){ return (l.from===aId&&l.to===bId)||(l.from===bId&&l.to===aId); }))
      _links.push({ from:aId, to:bId, mode:'debate' });
  });

  // ── Seals: verified receptions (samāʿ certificates) ─────────────────
  // Each verified reception seals the teaching's link and connects the
  // chain onward to the learner who attested it.
  verifications.forEach(function(v){
    // Person-level: confirmed adab (taʿdīl) attaches to the person, not a link
    if(v.kind==='adab'){
      if(!v.to_name) return;
      var pid=slug(v.to_name);
      var pn=person(pid, v.to_name, 'Student', 2, 'adab', false);
      (pn.adab=pn.adab||[]).push({ text:v.evidence||'', by:v.verified_by||'facilitator' });
      return;
    }
    if((v.kind!=='reception' && v.kind!=='buildon') || !v.to_name) return;
    var learnerId = slug(v.to_name);
    var tl = v.teaching_id ? teachingLink[v.teaching_id] : null;
    var subjKey = tl ? tl.subject : 'math';
    person(learnerId, v.to_name, 'Student', 2, subjKey, false);
    function seal(l, ev){
      l.verified = true;
      l.vCount = (l.vCount||0)+1;
      if(ev && !l.evidence) l.evidence = ev;
      if(ev){ (l.evidences=l.evidences||[]).push({ who:v.to_name, text:ev }); }
    }
    if(tl){
      // Seal teacher → teaching (carrying the attestation), and teaching → learner
      for(var i=0;i<_links.length;i++){
        if(_links[i].from===tl.teacherId && _links[i].to===tl.subjId){ seal(_links[i], v.evidence); break; }
      }
      if(learnerId!==tl.teacherId) seal(addLink(tl.subjId, learnerId, 'peer'), v.evidence);
    } else if(v.from_name){
      // No teaching row to anchor to — seal a direct teacher → learner link
      var teacherId = slug(v.from_name);
      person(teacherId, v.from_name, 'Student', 2, subjKey, false);
      if(learnerId!==teacherId) seal(addLink(teacherId, learnerId, 'peer'), v.evidence);
    }
  });

  layoutBands();

  var status = document.getElementById('nav-status');
  var sealedCount=_links.filter(function(l){return l.verified;}).length;
  if(_people.length){
    status.textContent = _people.length+' people · '+_links.length+' links'+(sealedCount?' · '+sealedCount+' sealed':'');
    document.getElementById('stage-message').style.display='none';
    document.getElementById('stage-sized').style.display='block';
  } else {
    document.getElementById('stage-message').innerHTML =
      'No published teachings yet.<br><span style="font-weight:600;font-size:13.5px;color:#8fae9f;">Publish a Teach It lesson or complete a public debate, and the isnād will begin to grow.</span>';
    status.textContent = '0 people · 0 links';
  }

  measure();
  renderAll();
}

// ── Assign x/y positions inside the KTC grade bands ──────────
function layoutBands(){
  var CARD_W=164, GAP=36, X0=230, X1=STAGE_W-40;
  var byBand={};
  _people.forEach(function(p){ (byBand[p.band]=byBand[p.band]||[]).push(p); });
  Object.keys(byBand).forEach(function(b){
    var list=byBand[b], y=BANDS[b].y;
    var perRow=Math.max(1, Math.floor((X1-X0)/(CARD_W+GAP)));
    var rows=Math.ceil(list.length/perRow);
    list.forEach(function(p,i){
      var row=Math.floor(i/perRow), inRow=Math.min(perRow, list.length-row*perRow);
      var idx=i-row*perRow;
      var span=inRow*(CARD_W+GAP)-GAP;
      var startX=X0+((X1-X0)-span)/2+CARD_W/2;
      p.x=startX+idx*(CARD_W+GAP);
      p.y=y+(rows>1 ? (row-(rows-1)/2)*74 : 0);
    });
  });
}

// ══════════════════════════════════════════════════════════════
// CHAIN HIGHLIGHT  (KTC computeHot)
// ══════════════════════════════════════════════════════════════
function computeHot(focus){
  if(!focus) return { nodes:null, edges:null };
  var up=new Set(), down=new Set(), stack=[focus];
  while(stack.length){ var id=stack.pop(); _links.forEach(function(l){ if(l.to===id && !up.has(l.from)){ up.add(l.from); stack.push(l.from); } }); }
  stack=[focus];
  while(stack.length){ var id2=stack.pop(); _links.forEach(function(l){ if(l.from===id2 && !down.has(l.to)){ down.add(l.to); stack.push(l.to); } }); }
  var nodes=new Set([focus]); up.forEach(function(x){nodes.add(x);}); down.forEach(function(x){nodes.add(x);});
  var edges=new Set();
  _links.forEach(function(l,i){ if(nodes.has(l.from)&&nodes.has(l.to)) edges.add(i); });
  return { nodes:nodes, edges:edges };
}

// STARS  (KTC twinkle field)
// ══════════════════════════════════════════════════════════════
function makeStars(){
  var s=987654321, rnd=function(){ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };
  var out='';
  for(var i=0;i<70;i++){
    var x=(rnd()*100).toFixed(2), y=(rnd()*100).toFixed(2);
    var r=(rnd()*1.4+0.5), o=(rnd()*0.5+0.2).toFixed(2);
    var dur=(rnd()*3+2.5).toFixed(2), del=(rnd()*4).toFixed(2);
    out+='<span style="position:absolute;left:'+x+'%;top:'+y+'%;width:'+(r*2).toFixed(1)+'px;height:'+(r*2).toFixed(1)+'px;border-radius:50%;background:#fbf3d8;opacity:'+o+';box-shadow:0 0 '+(r*3).toFixed(1)+'px #fbe7b8;animation:twinkle '+dur+'s ease-in-out '+del+'s infinite;"></span>';
  }
  document.getElementById('stars-layer').innerHTML=out;
}

// SCALE  (fit 1740×1010 stage into container, KTC getScale)
// ══════════════════════════════════════════════════════════════
function measure(){
  var c=document.getElementById('stage-container');
  if(!c) return;
  var w=c.clientWidth-32, h=c.clientHeight-32;
  var scale=Math.min(w/STAGE_W, h/STAGE_H, 1.05);
  if(!(scale>0)) scale=0.5;
  var sized=document.getElementById('stage-sized');
  sized.style.width=(STAGE_W*scale)+'px';
  sized.style.height=(STAGE_H*scale)+'px';
  document.getElementById('stage-inner').style.transform='scale('+scale+')';
}

function buildChain(id){
  var anc=[], cur=id, g=0;
  while(g++<40){ var l=null; for(var i=0;i<_links.length;i++){ if(_links[i].to===cur){ l=_links[i]; break; } } if(!l) break; anc.unshift({id:l.from,mode:l.mode}); cur=l.from; }
  var desc=[]; cur=id; g=0;
  while(g++<40){ var l2=null; for(var j=0;j<_links.length;j++){ if(_links[j].from===cur){ l2=_links[j]; break; } } if(!l2) break; desc.push({id:l2.to,mode:l2.mode}); cur=l2.to; }
  var chain=[];
  anc.forEach(function(a,k){ chain.push({ id:a.id, arrowColor:k===0?'':MODE[anc[k-1].mode].c }); });
  chain.push({ id:id, arrowColor:anc.length?MODE[anc[anc.length-1].mode].c:'', isFocus:true });
  desc.forEach(function(d){ chain.push({ id:d.id, arrowColor:MODE[d.mode].c }); });
  return chain;
}

  var readOnly=!editable;
  var name=getName(id);

  var fieldStyle="width:100%;box-sizing:border-box;font-family:'Nunito',sans-serif;font-size:13px;color:"+(editable?'#3a2e1a':'#6a5a3f')+";background:"+(editable?'#fffdf6':'#f1ece0')+";border:1px solid #e3d6b6;border-radius:8px;padding:7px 9px;outline:none;";
  var areaStyle=fieldStyle+"min-height:58px;resize:vertical;line-height:1.45;";
  var titleStyle="width:100%;box-sizing:border-box;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:21px;color:#2f2110;background:"+(editable?'#fffdf6':'transparent')+";border:1px solid "+(editable?'#e3d6b6':'transparent')+";border-radius:8px;padding:"+(editable?'4px 8px':'4px 0')+";outline:none;";
  var nameInlineStyle="flex:1;min-width:0;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:13.5px;color:#2f2110;background:"+(editable?'#fffdf6':'transparent')+";border:1px solid "+(editable?'#e3d6b6':'transparent')+";border-radius:7px;padding:"+(editable?'3px 7px':'2px 0')+";outline:none;";

  var learnedFrom=_links.filter(function(l){ return l.to===id; }).map(function(l){
    var key=l.from+'>'+id;
    return { id:l.from, name:getName(l.from), modeLabel:MODE[l.mode].label, color:MODE[l.mode].c, key:key, note:_edits.transmit[key]||'', verified:!!l.verified, evidences:l.evidences||[] };
  });
  var teaches=_links.filter(function(l){ return l.from===id; }).map(function(l){
    var key=id+'>'+l.to;
    return { id:l.to, name:getName(l.to), modeLabel:MODE[l.mode].label, color:MODE[l.mode].c, key:key, note:_edits.transmit[key]||'', verified:!!l.verified, evidences:l.evidences||[] };
  });
  var chain=buildChain(id);
  var extraLearned=getExtra('learned',id), extraTaught=getExtra('taught',id);
  var isOrigin=learnedFrom.length===0, isLeaf=teaches.length===0;
  var subjectLabel=(sk==='studios'&&getStudio(id))?('Studios · '+getStudio(id)):subj.label;

  var bannerStyle="font-family:'Baloo 2';font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:7px 12px;border-radius:8px;text-align:center;background:"+(editable?'#e7f1ec':'#f3ede0')+";color:"+(editable?'#117a60':'#a07f3e')+";";
  var bannerText=editable?'● Editing — changes save automatically':'Previewing — click to pin & edit';

  var h='<div style="padding:20px 22px 40px;animation:risein .2s ease both;">';
  h+='<div style="'+bannerStyle+'">'+bannerText+'</div>';

  // Avatar + name + close
  h+='<div style="display:flex;align-items:flex-start;gap:12px;margin-top:14px;">';
  h+='<div style="flex:none;width:46px;height:46px;border-radius:50%;background:'+subj.pale+';display:flex;align-items:center;justify-content:center;margin-top:2px;">'+glyphSvg(sk,26)+'</div>';
  h+='<div style="flex:1;min-width:0;">';
  h+='<input value="'+esc(name)+'" '+(readOnly?'readonly ':'')+'onchange="setEdit(\'names\',\''+escJs(id)+'\',this.value);renderAll()" placeholder="Name" style="'+titleStyle+'">';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-top:6px;">'
    +'<span style="font-size:12.5px;color:#8a7350;font-weight:700;">'+esc(p.grade||'')+'</span>'
    +'<span style="width:4px;height:4px;border-radius:50%;background:#cdbb90;"></span>'
    +'<span style="font-size:12.5px;color:'+subj.color+';font-weight:800;">'+esc(subjectLabel)+'</span>'
    +'</div></div>';
  h+='<button onclick="closeDetail(event)" style="flex:none;background:none;border:none;cursor:pointer;color:#b0a487;padding:4px;line-height:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg></button>';
  h+='</div>';

  // Subject pills (editable only)
  if(editable){
    h+='<div style="margin-top:14px;">';
    h+='<div style="font-family:\'Baloo 2\';font-weight:700;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#9a8a6c;margin-bottom:7px;">What this person carries</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    SUBJ_KEYS.forEach(function(k){
      var s=SUBJ[k], active=k===sk;
      h+='<button onclick="event.stopPropagation();setEdit(\'subjects\',\''+escJs(id)+'\',\''+k+'\');renderAll()" style="font-family:\'Baloo 2\',sans-serif;font-weight:700;font-size:12px;cursor:pointer;padding:5px 11px;border-radius:999px;border:1px solid '+(active?s.color:'#e6dcc4')+';background:'+(active?s.pale:'#f6f1e4')+';color:'+(active?s.color:'#8a7350')+';">'+s.label+'</button>';
    });
    h+='</div>';
    if(sk==='studios'){
      h+='<div style="margin-top:11px;padding:11px 12px;background:#f4f0fa;border:1px solid #e3d9f3;border-radius:12px;">';
      h+='<div style="font-family:\'Baloo 2\';font-weight:700;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#6a4ca0;margin-bottom:8px;">Studio focus</div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:6px;">';
      STUDIOS.forEach(function(a){
        var active=getStudio(id)===a;
        h+='<button onclick="event.stopPropagation();setEdit(\'studio\',\''+escJs(id)+'\',\''+(active?'':escJs(a))+'\');renderAll()" style="font-family:\'Nunito\',sans-serif;font-weight:700;font-size:12px;cursor:pointer;padding:5px 11px;border-radius:999px;border:1px solid '+(active?'#6a4ca0':'#ddd1ee')+';background:'+(active?'#e6ddf2':'#f4f0fa')+';color:'+(active?'#6a4ca0':'#8a7ba8')+';">'+esc(a)+'</button>';
      });
      h+='</div></div>';
    }
    h+='</div>';
  }

  // Isnād chain ribbon
  h+='<div style="margin-top:16px;padding:11px 12px;background:#f7efdc;border-radius:12px;">';
  h+='<div style="font-family:\'Baloo 2\';font-weight:700;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#a07f3e;margin-bottom:8px;">The chain (isnād)</div>';
  h+='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:3px;">';
  chain.forEach(function(c){
    if(c.arrowColor) h+='<svg width="15" height="13" viewBox="0 0 16 14" style="flex:none;"><path d="M2 7h10M9 3l4 4-4 4" stroke="'+c.arrowColor+'" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"></path></svg>';
    var chipStyle=c.isFocus
      ? "font-family:'Baloo 2',sans-serif;font-weight:800;font-size:12.5px;color:#fff;background:#0c5a47;padding:4px 11px;border-radius:999px;white-space:nowrap;"
      : "font-family:'Baloo 2',sans-serif;font-weight:700;font-size:12.5px;color:#5a4a2e;background:#fff;border:1px solid #e0d3b4;padding:4px 10px;border-radius:999px;white-space:nowrap;";
    h+='<span style="'+chipStyle+'">'+esc(getName(c.id))+'</span>';
  });
  h+='</div></div>';

  // Learned from
  h+='<div style="margin-top:18px;">';
  h+='<div style="font-family:\'Baloo 2\';font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#117a60;margin-bottom:9px;">Learned from</div>';
  if(isOrigin) h+='<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#8a7350;font-weight:700;padding-bottom:4px;">'+STAR_SVG+'Origin of the chain — knowledge enters here.</div>';
  learnedFrom.forEach(function(l){
    h+='<div style="margin-bottom:12px;padding:10px 12px;background:#f6f1e4;border-radius:11px;">';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">'
      +'<span style="width:9px;height:9px;border-radius:50%;flex:none;background:'+l.color+';"></span>'
      +'<span style="font-size:13.5px;color:#2f2110;font-weight:800;font-family:\'Baloo 2\';">'+esc(l.name)+'</span>'
      +'<span style="font-size:10.5px;color:'+l.color+';font-weight:800;letter-spacing:.06em;text-transform:uppercase;">'+l.modeLabel+'</span>'
      +sealChipHtml(l)
      +'</div>';
    h+='<input value="'+esc(l.note)+'" '+(readOnly?'readonly ':'')+'onchange="setEdit(\'transmit\',\''+escJs(l.key)+'\',this.value)" placeholder="What was passed on… (e.g. Surah Al-Fātiḥah, tajwīd of the first 3 āyāt)" style="'+fieldStyle+'">';
    h+=evidenceHtml(l);
    h+='</div>';
  });
  extraLearned.forEach(function(x,xi){
    h+=extraCard(id,'learned',xi,x,readOnly,fieldStyle,nameInlineStyle,'#f6f1e4','#c0b395',"Teacher's name");
  });
  if(editable) h+='<button onclick="event.stopPropagation();addExtra(\'learned\',\''+escJs(id)+'\')" style="width:100%;box-sizing:border-box;font-family:\'Baloo 2\',sans-serif;font-weight:700;font-size:12.5px;border-radius:9px;padding:8px;cursor:pointer;margin-top:2px;border-style:dashed;border-width:1px;color:#117a60;background:#eef5f0;border-color:#b8d4c8;">+ Add another teacher</button>';
  h+='</div>';

  // Adab
  h+='<div style="margin-top:8px;padding:12px 13px;background:#fbeceb;border:1px solid #f1d3d3;border-radius:12px;">';
  h+='<div style="display:flex;align-items:center;gap:7px;font-family:\'Baloo 2\';font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#b0394a;margin-bottom:8px;"><svg width="14" height="14" viewBox="0 0 20 20"><path d="M10 16.5s-5.5-3.4-5.5-7.3C4.5 7 6 5.8 7.6 5.8c1.1 0 1.9.6 2.4 1.5.5-.9 1.3-1.5 2.4-1.5 1.6 0 3.1 1.2 3.1 3.4 0 3.9-5.5 7.3-5.5 7.3z" fill="#b0394a"></path></svg>Adab &amp; character shown</div>';
  if(p.adab && p.adab.length){
    p.adab.slice(0,4).forEach(function(a){
      h+='<div style="margin-bottom:8px;padding:8px 10px;background:#fff;border-left:3px solid #e08a8a;border-radius:0 8px 8px 0;">'
        +'<div style="font-size:10px;color:#b0394a;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;">Witnessed · confirmed by '+esc(a.by)+'</div>'
        +'<div style="font-size:12px;color:#5a4a32;line-height:1.5;font-style:italic;">'+esc(a.text)+'</div>'
        +'</div>';
    });
  }
  h+='<textarea '+(readOnly?'readonly ':'')+'onchange="setEdit(\'adab\',\''+escJs(id)+'\',this.value)" placeholder="Good character this learner displayed or passed on… (e.g. helped a younger student without being asked; lowered their voice in the masjid; gave salām first)" style="'+areaStyle+'">'+esc(_edits.adab[id]||'')+'</textarea>';
  h+='</div>';

  // Then teaches
  h+='<div style="margin-top:18px;">';
  h+='<div style="font-family:\'Baloo 2\';font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#1f7a8c;margin-bottom:9px;">Then teaches</div>';
  if(isLeaf) h+='<div style="font-size:13px;color:#8a7350;font-weight:700;padding-bottom:4px;">The youngest learner in this chain — for now.</div>';
  teaches.forEach(function(t){
    h+='<div style="margin-bottom:12px;padding:10px 12px;background:#eef5f6;border-radius:11px;">';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">'
      +'<span style="width:9px;height:9px;border-radius:50%;flex:none;background:'+t.color+';"></span>'
      +'<input value="'+esc(t.name)+'" '+(readOnly?'readonly ':'')+'onchange="setEdit(\'names\',\''+escJs(t.id)+'\',this.value);renderAll()" placeholder="Peer\'s name" style="'+nameInlineStyle+'">'
      +'<span style="font-size:10.5px;color:'+t.color+';font-weight:800;letter-spacing:.06em;text-transform:uppercase;flex:none;">'+t.modeLabel+'</span>'
      +sealChipHtml(t)
      +'</div>';
    h+='<input value="'+esc(t.note)+'" '+(readOnly?'readonly ':'')+'onchange="setEdit(\'transmit\',\''+escJs(t.key)+'\',this.value)" placeholder="What was transmitted to them…" style="'+fieldStyle+'">';
    h+=evidenceHtml(t);
    h+='</div>';
  });
  extraTaught.forEach(function(x,xi){
    h+=extraCard(id,'taught',xi,x,readOnly,fieldStyle,nameInlineStyle,'#eef5f6','#a9bcc1',"Peer's name");
  });
  if(editable) h+='<button onclick="event.stopPropagation();addExtra(\'taught\',\''+escJs(id)+'\')" style="width:100%;box-sizing:border-box;font-family:\'Baloo 2\',sans-serif;font-weight:700;font-size:12.5px;border-radius:9px;padding:8px;cursor:pointer;margin-top:2px;border-style:dashed;border-width:1px;color:#1f7a8c;background:#eef5f6;border-color:#bcd9df;">+ Add another student</button>';
  h+='</div>';

  if(readOnly) h+='<div style="margin-top:6px;text-align:center;font-size:12.5px;color:#a07f3e;font-weight:700;">Click this person on the map to edit ✎</div>';

  h+='</div>';
  return h;
}

function extraCard(nodeId, dir, idx, x, readOnly, fieldStyle, nameInlineStyle, bg, removeColor, namePlaceholder){
  var mc=MODE[x.mode||'peer']||MODE.peer;
  var h='<div style="margin-bottom:12px;padding:10px 12px;background:'+bg+';border-radius:11px;">';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">';
  h+='<button '+(readOnly?'disabled ':'')+'onclick="event.stopPropagation();cycleExtra(\''+dir+'\',\''+escJs(nodeId)+'\','+idx+')" title="Change teaching mode" style="width:13px;height:13px;border-radius:50%;flex:none;border:none;padding:0;cursor:pointer;background:'+mc.c+';"></button>';
  h+='<input value="'+esc(x.name||'')+'" '+(readOnly?'readonly ':'')+'onchange="setExtra(\''+dir+'\',\''+escJs(nodeId)+'\','+idx+',\'name\',this.value)" placeholder="'+esc(namePlaceholder)+'" style="'+nameInlineStyle+'">';
  h+='<span style="font-size:10.5px;color:'+mc.c+';font-weight:800;letter-spacing:.06em;text-transform:uppercase;flex:none;">'+mc.label+'</span>';
  if(!readOnly) h+='<button onclick="event.stopPropagation();removeExtra(\''+dir+'\',\''+escJs(nodeId)+'\','+idx+')" style="flex:none;background:none;border:none;cursor:pointer;color:'+removeColor+';padding:2px;line-height:0;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg></button>';
  h+='</div>';
  h+='<input value="'+esc(x.note||'')+'" '+(readOnly?'readonly ':'')+'onchange="setExtra(\''+dir+'\',\''+escJs(nodeId)+'\','+idx+',\'note\',this.value)" placeholder="What was passed on…" style="'+fieldStyle+'">';
  h+='</div>';
  return h;
}

// ══════════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════════
function renderAll(){ renderModeLegend(); renderStage(); renderSidebar(); }

function hoverNode(id){ if(_hover===id) return; _hover=id; renderStage(); if(!_pin) renderSidebar(); }
function unhoverNode(id){ if(_hover===id){ _hover=null; renderStage(); if(!_pin) renderSidebar(); } }
function clickNode(ev,id){ ev.stopPropagation(); _pin=_pin===id?null:id; renderAll(); }
function clearPin(){ if(_pin){ _pin=null; renderAll(); } }
function closeDetail(ev){ if(ev) ev.stopPropagation(); _pin=null; _hover=null; renderAll(); }
function toggleMode(ev,k){ if(ev) ev.stopPropagation(); _modeFilter=_modeFilter===k?null:k; renderAll(); }
function resetAll(ev){ if(ev) ev.stopPropagation(); _hover=null; _pin=null; _modeFilter=null; renderAll(); }

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
makeStars();
renderModeLegend();
renderSidebar();
window.addEventListener('resize', measure);
if(typeof ResizeObserver!=='undefined'){
  new ResizeObserver(function(){ measure(); }).observe(document.getElementById('stage-container'));
}
measure();
loadData();
</script>
</body>
</html>
