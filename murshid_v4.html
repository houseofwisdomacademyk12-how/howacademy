<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المرشد — The Murshid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a2e;--ink-2:#2e2e44;--ink-3:#5a5a78;--ink-4:#9a9ab0;--ink-5:#d0d0e0;
  --parchment:#f9f7f4;--p2:#f0ece4;--p3:#e4ddd0;
  --gold:#d4af37;--gl:#e8cc70;--gp:#fdf5d0;
  --teal:#1d6f6f;--tl:#d0eaea;
  --coral:#8b3a2a;--cl:#f5e0da;
  --blue:#1e4a7a;--bl:#ddeaf8;
  --green:#3a6b2a;--gnl:#dcecd8;
  --r:8px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--ink);height:100vh;overflow:hidden;font-size:14px}

/* ── SHELL ── */
.shell{display:grid;grid-template-columns:300px 1fr 280px;height:100vh}

/* ── LEFT: SAHIFA CONTEXT ── */
.left-panel{background:var(--p2);border-right:1px solid var(--ink-5);display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:16px;border-bottom:1px solid var(--ink-5);flex-shrink:0}
.panel-title{font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);margin-bottom:10px}
.student-row{display:flex;align-items:center;gap:10px}
.s-avatar{width:36px;height:36px;border-radius:50%;background:var(--gp);border:1.5px solid var(--gl);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--gold);flex-shrink:0}
.s-name{font-size:13px;font-weight:500;color:var(--ink)}
.s-meta{font-size:11px;color:var(--ink-4)}
.panel-scroll{flex:1;overflow-y:auto;padding:12px}
.ctx-section{margin-bottom:14px}
.ctx-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4);margin-bottom:7px;display:block}
.ctx-entry{background:white;border:1px solid var(--ink-5);border-radius:var(--r);padding:9px 11px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.ctx-entry:hover{border-color:var(--gl)}
.ctx-entry.selected{border-color:var(--gold);background:var(--gp)}
.ctx-grade{font-size:10px;color:var(--ink-4);margin-bottom:2px}
.ctx-text{font-size:12px;color:var(--ink-2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ctx-type-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot-opening{background:#534AB7}.dot-main{background:var(--teal)}.dot-scholar{background:var(--gold)}.dot-revision{background:var(--green)}

/* ── CENTRE: CONVERSATION ── */
.centre{display:flex;flex-direction:column;background:var(--parchment);overflow:hidden}
.convo-header{padding:14px 20px;border-bottom:1px solid var(--ink-5);flex-shrink:0;display:flex;align-items:center;gap:12px;background:white}
.murshid-id{display:flex;align-items:center;gap:10px}
.m-seal{width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:18px;color:var(--gp);flex-shrink:0}
.m-title{font-size:14px;font-weight:500;color:var(--ink)}
.m-subtitle{font-size:11px;color:var(--ink-4)}
.mode-pills{display:flex;gap:6px;margin-left:auto}
.mode-pill{font-size:11px;padding:4px 11px;border-radius:99px;border:1px solid var(--ink-5);background:white;cursor:pointer;color:var(--ink-3);transition:all .15s;font-family:'DM Sans',sans-serif}
.mode-pill:hover{border-color:var(--ink-4);color:var(--ink)}
.mode-pill.active{background:var(--gp);border-color:var(--gl);color:var(--gold);font-weight:500}

/* conversation */
.convo-scroll{flex:1;overflow-y:auto;padding:20px}
.bubble-row{display:flex;gap:10px;margin-bottom:18px;align-items:flex-start}
.bubble-row.user{flex-direction:row-reverse}
.b-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:2px}
.b-av-m{background:var(--gold);color:var(--gp);font-family:'Amiri',serif;font-size:14px}
.b-av-s{background:var(--bl);color:var(--blue)}
.bubble{max-width:78%;padding:12px 15px;border-radius:var(--rl);font-size:13px;line-height:1.75}
.bubble.murshid{background:white;border:1px solid var(--ink-5);color:var(--ink-2);border-radius:0 var(--rl) var(--rl) var(--rl)}
.bubble.murshid .serif-quote{font-family:'DM Serif Display',serif;font-style:italic;font-size:14px;color:var(--ink);border-left:2px solid var(--gold);padding-left:10px;margin-bottom:10px;line-height:1.6}
.bubble.murshid .m-question{font-size:12px;font-weight:500;color:var(--gold);border-top:1px solid var(--ink-5);padding-top:9px;margin-top:9px}
.bubble.user{background:var(--bl);border:1px solid #85B7EB;color:var(--blue);border-radius:var(--rl) 0 var(--rl) var(--rl)}
.bubble.system{background:var(--p2);border:1px solid var(--ink-5);color:var(--ink-4);font-style:italic;border-radius:var(--r);font-size:12px;max-width:60%;margin:0 auto;text-align:center}
.typing-indicator{display:flex;align-items:center;gap:8px;color:var(--ink-4);font-size:12px;padding:8px 0}
.dots{display:flex;gap:3px}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:dp 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* input area */
.input-area{padding:14px 16px;border-top:1px solid var(--ink-5);background:white;flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-wrap{flex:1;border:1px solid var(--ink-5);border-radius:var(--rl);padding:10px 14px;transition:border-color .15s;background:var(--parchment)}
.input-wrap:focus-within{border-color:var(--gold);background:white}
#user-input{width:100%;border:none;background:none;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);resize:none;outline:none;line-height:1.6;max-height:120px;overflow-y:auto}
.input-hint{font-size:10px;color:var(--ink-5);margin-top:4px}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.send-btn:hover{background:var(--gl)}
.send-btn svg{color:white}
.input-actions{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.quick-btn{font-size:11px;padding:4px 10px;border-radius:var(--r);border:1px solid var(--ink-5);background:white;cursor:pointer;color:var(--ink-3);font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.quick-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gp)}

/* ── RIGHT: MODE PANELS ── */
.right-panel{background:var(--p2);border-left:1px solid var(--ink-5);display:flex;flex-direction:column;overflow:hidden}
.rp-scroll{flex:1;overflow-y:auto;padding:14px}
.rp-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4);margin-bottom:9px;display:block}
.thread-card{background:white;border:1px solid var(--ink-5);border-radius:var(--r);padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.thread-card:hover{border-color:var(--gl);background:var(--gp)}
.tc-grade{font-size:10px;color:var(--gold);font-weight:500;margin-bottom:2px}
.tc-text{font-size:12px;color:var(--ink-2);line-height:1.55}
.challenge-card{background:var(--gp);border:1px solid var(--gl);border-radius:var(--rl);padding:13px;margin-bottom:10px}
.ch-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.ch-text{font-family:'DM Serif Display',serif;font-style:italic;font-size:13px;color:var(--ink);line-height:1.7;margin-bottom:9px}
.ch-source{font-size:10px;color:var(--ink-4)}
.munazara-card{background:var(--cl);border:1px solid #F0997B;border-radius:var(--rl);padding:13px;margin-bottom:10px}
.mn-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--coral);margin-bottom:7px}
.mn-text{font-size:13px;color:var(--ink-2);line-height:1.65;margin-bottom:8px}
.btn-sm{font-size:11px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--ink-5);background:white;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink-3);transition:all .12s}
.btn-sm:hover{background:var(--p2);border-color:var(--ink-4)}
.btn-sm.gold{background:var(--gp);border-color:var(--gl);color:var(--gold)}
.btn-sm.coral{background:var(--cl);border-color:#F0997B;color:var(--coral)}
.rule-card{background:white;border:1px solid var(--ink-5);border-radius:var(--r);padding:9px 11px;margin-bottom:6px}
.rule-n{font-size:11px;font-weight:500;color:var(--ink-2);margin-bottom:2px}
.rule-t{font-size:11px;color:var(--ink-4);line-height:1.5}

/* onboarding */
.onboard{padding:32px 20px;text-align:center}
.onboard-seal{font-family:'Amiri',serif;font-size:48px;color:var(--gold);margin-bottom:12px}
.onboard-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink);margin-bottom:8px}
.onboard-sub{font-size:13px;color:var(--ink-3);line-height:1.7;margin-bottom:20px}
input.field{width:100%;border:1px solid var(--ink-5);border-radius:var(--r);padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--p2);transition:border-color .15s;margin-bottom:8px}
input.field:focus{outline:none;border-color:var(--gold);background:white}
.btn{font-size:12px;padding:8px 16px;border-radius:var(--r);border:1px solid var(--ink-5);background:white;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink-3);transition:all .12s}
.btn:hover{background:var(--p2);border-color:var(--ink-4)}
.btn.primary{background:var(--gp);border-color:var(--gl);color:var(--gold);font-weight:500}
.btn.primary:hover{background:var(--gl)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:var(--parchment);padding:10px 16px;border-radius:var(--r);font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.constraint-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;background:var(--p3);color:var(--ink-4);border:1px solid var(--ink-5);margin-right:4px;margin-bottom:4px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="shell">

  <!-- ── LEFT: SAHIFA CONTEXT ── -->
  <div class="left-panel">
    <div class="panel-header">
      <p class="panel-title">Sahifa context</p>
      <div class="student-row">
        <div class="s-avatar" id="lp-avatar">YA</div>
        <div>
          <p class="s-name" id="lp-name">Loading…</p>
          <p class="s-meta" id="lp-meta">…</p>
        </div>
      </div>
    </div>
    <div class="panel-scroll" id="sahifa-ctx"></div>
  </div>

  <!-- ── CENTRE: CONVERSATION ── -->
  <div class="centre">
    <div class="convo-header">
      <div class="murshid-id">
        <div class="m-seal">م</div>
        <div>
          <p class="m-title">المرشد · The Murshid</p>
          <p class="m-subtitle" id="convo-subtitle">Scholarly guide · reads your sahifa</p>
        </div>
      </div>
      <div class="mode-pills">
        <button class="mode-pill active" data-mode="open" onclick="setMode(this)">Open inquiry</button>
        <button class="mode-pill" data-mode="challenge" onclick="setMode(this)">Challenge me</button>
        <button class="mode-pill" data-mode="munazara" onclick="setMode(this)">Munazara prep</button>
        <button class="mode-pill" data-mode="thread" onclick="setMode(this)">Find threads</button>
      </div>
    </div>

    <div class="convo-scroll" id="convo-scroll"></div>

    <div class="input-area">
      <div class="input-actions" id="quick-actions"></div>
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="user-input" rows="1" placeholder="Write your question — but first, what have you tried?"
            oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <p class="input-hint">Shift+Enter for new line · Enter to send</p>
        </div>
        <button class="send-btn" onclick="sendMessage()" aria-label="Send">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── RIGHT: MODE PANEL ── -->
  <div class="right-panel">
    <div class="panel-header" style="padding:16px">
      <p class="panel-title" id="rp-title">Murshid rules</p>
    </div>
    <div class="rp-scroll" id="right-panel-content"></div>
  </div>

</div>

<script>
// ── STORAGE ─────────────────────────────────────────────────────
const S={
  get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))},
};
const getSahifa=()=>S.get('sahifa_entries')||[];
const getSettings=()=>S.get('sahifa_settings')||S.get('ptl_settings')||{name:'',grade:'',juz:'',apiKey:''};
const getMHistory=()=>S.get('murshid_history')||[];
const saveMHistory=h=>S.set('murshid_history',h.slice(-40));
const toast=m=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)};

let currentMode='open';
let isWaiting=false;

// ── SYSTEM PROMPT ────────────────────────────────────────────────
function buildSystemPrompt(mode){
  const s=getSettings();
  const entries=getSahifa();
  const sahifaText=entries.length
    ? entries.map(e=>`[${e.type||'entry'} · ${e.date||'recent'}]: ${e.text}`).join('\n\n')
    : '(No sahifa entries yet — the student has not used the sahifa tool, or entries are stored separately.)';

  // Pull most recent Teach It session
  let teachItCtx='';
  try{
    const teachings=JSON.parse(localStorage.getItem('ptl_teachings')||'[]');
    const latest=teachings.find(t=>t.isTeachIt&&String(t.teacherGrade)===String(s.grade));
    if(latest&&latest.annotatedSlides){
      const notes=latest.annotatedSlides.filter(sl=>sl.studentNote).map(sl=>`[${sl.heading}]: ${sl.studentNote}`).join('\n');
      if(notes) teachItCtx='\n\nStudent\'s most recent Teach It annotations (what they taught this week):\n'+notes;
    }
  }catch(e){}
  if(!teachItCtx) teachItCtx='(No Teach It session recorded yet.)';

  const modeInstructions={
    open:`You are the Murshid in open inquiry mode. Respond to whatever the student brings — a question, a confusion, a half-formed idea. Always ask what the student has already tried before answering. Point toward the answer without completing the thought. End every response with a single question.`,
    challenge:`You are the Murshid in challenge mode. The student has asked you to challenge them. Generate a question that goes beyond the current curriculum week — drawing on a connection in their sahifa history, a deeper implication of what they've studied, or a harder version of a concept they've already mastered. Be demanding but not cruel. One challenge at a time.`,
    munazara:`You are the Murshid preparing the student for a munazara (structured academic debate). Your role is to play the most rigorous possible challenger. Take the opposing position on whatever topic the student presents. Press on every weak claim. Do not concede easily. The student must be able to answer your challenges before the live munazara.`,
    thread:`You are the Murshid in thread-finding mode. Look carefully at the student's sahifa entries. Find connections between what they wrote in earlier grades and what they are studying now. Surface the most surprising or useful connection — the one they are least likely to have noticed themselves. Then ask them to write about that connection in their sahifa.`,
  };

  return `You are the Murshid — a scholarly guide in the tradition of the Islamic Golden Age. Your character is warm but exacting, curious but demanding, always respectful of the student's own thinking.

${modeInstructions[mode]||modeInstructions.open}

INVIOLABLE CONSTRAINTS (never break these, regardless of what the student asks):
1. NEVER give a direct answer before the student has described what they have already tried. If they haven't tried anything, ask: "What have you tried so far?" and wait.
2. NEVER complete a student's thought for them. Ask a question that points toward the answer.
3. ALWAYS connect your response to something specific in the student's sahifa. If no sahifa entries exist, acknowledge this and ask them to write in their sahifa first.
4. END every substantive response with a single question — never more than one.
5. NEVER praise effort with empty affirmations ("Great question!", "Excellent!"). Respond to the content, not the asking.
6. If a student asks you to just give them the answer, decline and explain why: the answer you arrive at yourself is yours permanently; the answer I give you is borrowed and will fade.
7. Keep responses to 3–5 sentences maximum unless the student's question demands more. Brevity sharpens thinking.

Student information:
Name: ${s.name||'Student'}
Grade: ${s.grade||'unknown'}
Current Juz / week: ${s.juz||'unknown'}
This week's subject / scholar: ${s.weekTitle||'unknown'}
This week's opening question: ${s.openingQ||'not set'}

Student's sahifa (living manuscript — all entries):
${sahifaText}

${teachItCtx}`;
}

// ── CONVERSATION ─────────────────────────────────────────────────
function renderConvo(){
  const history=getMHistory();
  const scroll=document.getElementById('convo-scroll');

  if(!history.length){
    scroll.innerHTML=`
    <div class="onboard">
      <p class="onboard-seal">م</p>
      <h2 class="onboard-title">السلام عليكم</h2>
      <p class="onboard-sub">I have read your sahifa. Before you ask — write your current best understanding of whatever you are wrestling with. Not a question yet. Your thinking first.</p>
      ${!getSettings().apiKey?`
      <div style="background:var(--p2);border:1px solid var(--ink-5);border-radius:var(--rl);padding:16px;margin-top:16px;text-align:left">
        <p style="font-size:12px;font-weight:500;color:var(--ink-3);margin-bottom:8px">Connect to activate live responses</p>
        <input class="field" type="password" id="inline-api-key" placeholder="sk-ant-…" style="margin-bottom:8px">
        <button class="btn primary" onclick="saveInlineKey()" style="width:100%">Connect murshid</button>
        <p style="font-size:11px;color:var(--ink-4);margin-top:8px;line-height:1.5">Without a key, the murshid responds in demo mode. Get a key at console.anthropic.com.</p>
      </div>`:''}
    </div>`;
    return;
  }

  scroll.innerHTML = history.map(msg=>{
    if(msg.role==='system-note') return `<div class="bubble-row"><div class="bubble system">${msg.content}</div></div>`;
    const isUser=msg.role==='user';
    const s=getSettings();
    const initials=(s.name||'YA').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
    return`<div class="bubble-row ${isUser?'user':''}">
      <div class="b-avatar ${isUser?'b-av-s':'b-av-m'}">${isUser?initials:'م'}</div>
      <div class="bubble ${isUser?'user':'murshid'}">${formatBubble(msg.content,isUser)}</div>
    </div>`;
  }).join('');

  scroll.scrollTop=scroll.scrollHeight;
}

function formatBubble(text,isUser){
  if(isUser) return text.replace(/\n/g,'<br>');
  // murshid: style the closing question distinctly
  const parts=text.split(/(\n\n|\n)(?=[A-Z\u0600-\u06FF].*\?$)/);
  const lines=text.split('\n');
  const lastLine=lines[lines.length-1].trim();
  const isQuestion=lastLine.endsWith('?');
  if(isQuestion&&lines.length>1){
    const body=lines.slice(0,-1).join('\n').trim();
    return`<div class="serif-quote">${body.replace(/\n/g,'<br>')}</div><p class="m-question">${lastLine}</p>`;
  }
  return`<div class="serif-quote">${text.replace(/\n/g,'<br>')}</div>`;
}

function addToHistory(role,content){
  const h=getMHistory();
  h.push({role,content,ts:Date.now()});
  saveMHistory(h);
}

function addSystemNote(content){
  const h=getMHistory();
  h.push({role:'system-note',content,ts:Date.now()});
  saveMHistory(h);
}

// ── SEND ─────────────────────────────────────────────────────────
async function sendMessage(){
  if(isWaiting) return;
  const input=document.getElementById('user-input');
  const text=input.value.trim();
  if(!text) return;
  input.value=''; input.style.height='auto';
  addToHistory('user',text);
  renderConvo();
  await getMurshidResponse(text);
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

async function getMurshidResponse(userMessage){
  isWaiting=true;
  const s=getSettings();

  // Show typing
  const scroll=document.getElementById('convo-scroll');
  const typingEl=document.createElement('div');
  typingEl.className='bubble-row';
  typingEl.innerHTML=`<div class="b-avatar b-av-m">م</div><div class="typing-indicator"><div class="dots"><span></span><span></span><span></span></div><span>Reading your sahifa…</span></div>`;
  scroll.appendChild(typingEl);
  scroll.scrollTop=scroll.scrollHeight;

  if(!s.apiKey){
    await new Promise(r=>setTimeout(r,1400));
    typingEl.remove();
    const demoReplies={
      open:`You have brought a question — but first I want to know what you have already tried. Write it in your sahifa entry before you ask me. The thinking you do before asking is always more valuable than the answer I might give.\n\nWhat specific step did you attempt?`,
      challenge:`Here is your challenge. In your sahifa from Grade 5, you wrote about Al-Idrisi drawing the world in a circle. You now know that circumference = π × diameter. If Al-Idrisi's circular map had a border of circumference 4,800 km, what can you calculate — and what does that number tell you about the scale of his world?\n\nWrite your attempt in your sahifa before responding.`,
      munazara:`I will take the opposing position. You claim that the slope formula rise/run is intuitive. I say: it is entirely arbitrary. We could just as easily define slope as run/rise — horizontal change per unit of vertical rise — and it would be equally consistent. The entire convention is a choice, not a mathematical truth.\n\nDefend your position.`,
      thread:`In your Grade 3 entry you wrote about symmetry in flowers. In Grade 6 you asked why maps are usually rectangles. This week you are studying circles. These are the same idea — a shape that looks identical from every direction. You have been thinking about rotational symmetry for four years without naming it.\n\nWrite in your sahifa: how does the circle connect these two earlier observations?`,
    };
    const reply=demoReplies[currentMode]||demoReplies.open;
    addToHistory('assistant',reply);
    renderConvo();
    isWaiting=false;
    return;
  }

  try{
    const history=getMHistory().filter(m=>m.role==='user'||m.role==='assistant');
    const messages=history.map(m=>({role:m.role,content:m.content}));
    if(messages.length>0&&messages[messages.length-1].role==='user'){
      // already added
    }

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':s.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:400,
        system:buildSystemPrompt(currentMode),
        messages:messages.length>0?messages:[{role:'user',content:userMessage}],
      })
    });
    typingEl.remove();
    const data=await resp.json();
    if(data.error){throw new Error(data.error.message)}
    const reply=data.content?.[0]?.text||'The murshid could not respond.';
    addToHistory('assistant',reply);
    renderConvo();
  }catch(e){
    typingEl.remove();
    addToHistory('assistant',`There was an error: ${e.message}. Check your API key in the left panel.`);
    renderConvo();
  }
  isWaiting=false;
}

// ── MODES ────────────────────────────────────────────────────────
function setMode(btn){
  document.querySelectorAll('.mode-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  currentMode=btn.dataset.mode;
  const subtitles={open:'Open inquiry · reading your sahifa',challenge:'Challenge mode · pushing beyond mastery',munazara:'Munazara prep · the murshid as opponent',thread:'Thread finder · connecting across years'};
  document.getElementById('convo-subtitle').textContent=subtitles[currentMode]||'';
  updateQuickActions();
  updateRightPanel();
  addSystemNote(`— mode changed to ${currentMode.replace('-',' ')} —`);
  renderConvo();
}

function updateQuickActions(){
  const qa=document.getElementById('quick-actions');
  const actions={
    open:[
      {label:'What have I tried?',text:'Before I ask — I have tried: '},
      {label:'I\'m confused about…',text:'I understand the steps but I don\'t understand why '},
      {label:'Connect to scholar',text:'How does this connect to what Al-'},
    ],
    challenge:[
      {label:'Challenge me on this week',text:'I\'ve completed this week\'s work. Challenge me on: '},
      {label:'Harder version',text:'Give me a harder version of this problem: '},
      {label:'Cross-year challenge',text:'Use something from my earlier sahifa entries to challenge me.'},
    ],
    munazara:[
      {label:'I will defend that…',text:'I am going to defend the position that '},
      {label:'Press harder',text:'That objection is too easy. Press harder on: '},
      {label:'New position',text:'Let\'s start a new munazara. The topic is: '},
    ],
    thread:[
      {label:'Find the oldest thread',text:'What is the oldest connection you can find in my sahifa?'},
      {label:'Connect to current week',text:'What from my earliest entries connects to what I\'m studying now?'},
      {label:'Scholar thread',text:'Which scholar appears across the most entries in my sahifa?'},
    ],
  };
  const list=actions[currentMode]||actions.open;
  qa.innerHTML=list.map(a=>`<button class="quick-btn" onclick="insertQuick(${JSON.stringify(a.text)})">${a.label}</button>`).join('');
}

function insertQuick(text){
  const inp=document.getElementById('user-input');
  inp.value=text;
  inp.focus();
  autoResize(inp);
}

// ── RIGHT PANEL ──────────────────────────────────────────────────
function updateRightPanel(){
  const rp=document.getElementById('right-panel-content');
  const title=document.getElementById('rp-title');
  if(currentMode==='open'||currentMode==='thread') renderRulesPanel(rp,title);
  else if(currentMode==='challenge') renderChallengePanel(rp,title);
  else if(currentMode==='munazara') renderMunazaraPanel(rp,title);
}

function renderRulesPanel(rp,title){
  title.textContent='The murshid\'s rules';
  const rules=[
    ['Never answers first','Before giving any response, asks: "What have you tried?" If you haven\'t tried anything, sends you back to your sahifa.'],
    ['Never completes your thought','Points toward the answer with a question. The understanding you reach yourself is permanent. Borrowed answers fade.'],
    ['Always reads your sahifa','Every response connects to something specific you have written — an earlier entry, a thread, a revision, an open question.'],
    ['One question at a time','Every response ends with exactly one question. Never more. The question is the continuation, not the answer.'],
    ['No empty praise','Does not say "great question" or "excellent." Responds to your thinking, not to the fact that you asked.'],
    ['Refuses to be shortcut','If you ask for the answer directly, declines — and explains that the answer you find is yours, the answer you receive is borrowed.'],
  ];
  rp.innerHTML=`<span class="rp-label">How the murshid works</span>${rules.map(([n,t])=>`<div class="rule-card"><p class="rule-n">${n}</p><p class="rule-t">${t}</p></div>`).join('')}
  <div style="margin-top:14px">
    <span class="rp-label">Constraints active now</span>
    ${'Wait for attempt · Socratic only · Sahifa-grounded · One question · No praise · No shortcuts'.split(' · ').map(c=>`<span class="constraint-badge">${c}</span>`).join('')}
  </div>`;
}

function renderChallengePanel(rp,title){
  title.textContent='Challenge bank';
  const s=getSettings();
  const entries=getSahifa();
  const challenges=[
    {label:'Cross-year connection',src:'Sahifa thread · Grade 5 → current',text:'In Grade 5 you wrote about Al-Idrisi\'s circular map. You now know circumference = π × diameter. What can you calculate from a map\'s circular border alone — and what does that number mean?'},
    {label:'Deeper implication',src:'Current week · unit rates',text:'You said a unit rate simplifies the denominator to 1. What happens if the denominator is irrational — can you still have a unit rate? Give an example.'},
    {label:'Scholar\'s method',src:'Al-Battani · Observatory studio',text:'Al-Battani measured the solar year to within 2 minutes using no instruments beyond naked-eye observations. Reconstruct his method from first principles.'},
    {label:'Apply to unfamiliar context',src:'Slope · Civil Engineering studio',text:'You know slope = rise/run. A ramp for wheelchair access must have a maximum slope of 1:12. A doorway is 0.9m wide and the ramp can extend at most 7m. Does the ramp fit? Show the calculation.'},
  ];
  rp.innerHTML=`<span class="rp-label">Standing challenges from your sahifa</span>
  ${challenges.map(c=>`<div class="challenge-card">
    <p class="ch-label">${c.label}</p>
    <p class="ch-text">"${c.text}"</p>
    <p class="ch-source">${c.src}</p>
    <button class="btn-sm gold" style="margin-top:8px" onclick="sendChallenge(${JSON.stringify(c.text)})">Take this challenge</button>
  </div>`).join('')}`;
}

function renderMunazaraPanel(rp,title){
  title.textContent='Munazara preparation';
  const positions=[
    {topic:'The Fundamental Theorem of Calculus',defender:'You defend: the FTC is the most important theorem in calculus.',challenger:'Murshid challenges: L\'Hôpital\'s Rule is more practically useful.'},
    {topic:'Why algebra was necessary',defender:'You defend: Al-Khwarizmi invented algebra to solve a general class of problems.',challenger:'Murshid challenges: arithmetic was already sufficient for all practical problems of the era.'},
    {topic:'The value of the unit circle',defender:'You defend: the unit circle is the best way to understand trigonometry.',challenger:'Murshid challenges: SOHCAHTOA is more intuitive and equally rigorous.'},
  ];
  rp.innerHTML=`<span class="rp-label">How a munazara works</span>
  <div class="rule-card" style="margin-bottom:10px">
    <p class="rule-n">The structure</p>
    <p class="rule-t">You state a position. The murshid takes the strongest possible opposing view. You defend. The murshid presses. You must answer every challenge before the live munazara — a peer who has been briefed to challenge you on exactly the weak points the murshid found.</p>
  </div>
  <span class="rp-label" style="margin-top:10px">Practice positions</span>
  ${positions.map(p=>`<div class="munazara-card">
    <p class="mn-label">Topic: ${p.topic}</p>
    <p class="mn-text"><strong>Your position:</strong> ${p.defender}</p>
    <p class="mn-text" style="margin-top:4px"><strong>Murshid challenges:</strong> ${p.challenger}</p>
    <button class="btn-sm coral" style="margin-top:8px" onclick="startMunazara(${JSON.stringify(p.defender)})">Begin this munazara</button>
  </div>`).join('')}`;
}

function sendChallenge(text){
  const inp=document.getElementById('user-input');
  inp.value=`I accept this challenge: ${text}. My attempt: `;
  inp.focus();
  autoResize(inp);
}

function startMunazara(position){
  const inp=document.getElementById('user-input');
  inp.value=`I will defend: ${position}`;
  inp.focus();
  autoResize(inp);
}

// ── SAHIFA CONTEXT PANEL ─────────────────────────────────────────
function renderSahifaCtx(){
  const entries=getSahifa();
  const s=getSettings();
  const ctx=document.getElementById('sahifa-ctx');

  const initials=(s.name||'YA').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
  document.getElementById('lp-avatar').textContent=initials;
  document.getElementById('lp-name').textContent=s.name||'Student';
  document.getElementById('lp-meta').textContent=`Grade ${s.grade||'?'} · Juz ${s.juz||'?'} · ${entries.length} entries`;

  if(!entries.length){
    ctx.innerHTML=`
    <div style="padding:8px">
      <p style="font-size:12px;color:var(--ink-4);line-height:1.6;margin-bottom:12px">No sahifa entries found. Open the sahifa tool to begin writing. The murshid reads your entries each session.</p>
      <div style="background:var(--p3);border-radius:var(--r);padding:10px;margin-bottom:10px">
        <p style="font-size:11px;font-weight:500;color:var(--ink-3);margin-bottom:6px">No Sahifa entries yet</p>
        <p style="font-size:11px;color:var(--ink-4);line-height:1.5">Open the Sahifa and write this week's entries — the Murshid reads them before responding.</p>
      </div>
    </div>`;
    return;
  }

  ctx.innerHTML=`<div style="padding:4px 0">
    <span class="ctx-label">This week's entries (${entries.filter(e=>e.date&&isRecent(e.date)).length})</span>
    ${entries.filter(e=>isRecent(e.date)).map(e=>ctxEntryHtml(e,true)).join('')||'<p style="font-size:12px;color:var(--ink-5);padding:4px 4px 8px">No entries this week yet.</p>'}
    <span class="ctx-label" style="margin-top:10px;display:block">Earlier entries (${entries.filter(e=>!isRecent(e.date)).length})</span>
    ${entries.filter(e=>!isRecent(e.date)).slice(0,6).map(e=>ctxEntryHtml(e,true)).join('')}
  </div>
  <div style="padding:12px 0;border-top:1px solid var(--ink-5);margin-top:8px">
    <p style="font-size:11px;font-weight:500;color:var(--ink-3);margin-bottom:8px">Add API key</p>
    <input class="field" type="password" id="ctx-api-key" placeholder="sk-ant-…" value="${s.apiKey||''}" style="margin-bottom:6px">
    <button class="btn primary" style="width:100%;font-size:11px;padding:6px" onclick="saveCtxKey()">Save key</button>
  </div>`;
}

function ctxEntryHtml(e,selectable){
  const typeColors={opening:'dot-opening',main:'dot-main',scholar:'dot-scholar',revision:'dot-revision'};
  const dc=typeColors[e.type]||'dot-main';
  return`<div class="ctx-entry ${selectable?'':''}">
    <p class="ctx-grade"><span class="ctx-type-dot ${dc}"></span>${e.type||'entry'} · ${e.date||'recent'}</p>
    <p class="ctx-text">${e.text||''}</p>
  </div>`;
}

function demoEntries(){
  return[
    {type:'opening',date:'This week',text:'I think π is the same for every circle because all circles are the same shape — just different sizes. But I\'m not sure if that\'s a real reason or circular reasoning.'},
    {type:'main',date:'This week',text:'We proved that circumference ÷ diameter always gives π. What surprised me: this isn\'t a definition, it\'s something true about the shape of space. Al-Battani used this to measure the Earth.'},
    {type:'scholar',date:'This week',text:'Al-Battani used circular geometry to refine the length of the solar year. His question was: how can we predict celestial positions precisely enough to correct the calendar?'},
    {type:'main',date:'Grade 5 · W7',text:'Al-Idrisi drew the known world in a circle. I wonder why maps are usually rectangles but he drew a circle. Maybe it\'s because the world is round?'},
    {type:'revision',date:'Revised in Grade 7',text:'I wrote in Grade 4 that decimals are smaller than fractions. That was confused — decimals and fractions are different notations for the same kind of number. 0.5 and ½ are identical.'},
  ];
}

function isRecent(dateStr){
  if(!dateStr) return false;
  return dateStr.toLowerCase().includes('this week')||dateStr.toLowerCase().includes('today')||dateStr.toLowerCase().includes('monday')||dateStr.toLowerCase().includes('tuesday')||dateStr.toLowerCase().includes('wednesday')||dateStr.toLowerCase().includes('thursday')||dateStr.toLowerCase().includes('friday');
}

function saveCtxKey(){
  const k=document.getElementById('ctx-api-key')?.value?.trim();
  const s=getSettings();
  s.apiKey=k;
  S.set('sahifa_settings',s);
  S.set('ptl_settings',s);
  S.set('sdt_settings',s);
  toast(k?'Murshid connected — live responses active.':'API key cleared.');
}

function saveInlineKey(){
  const k=document.getElementById('inline-api-key')?.value?.trim();
  if(!k){toast('Enter an API key.');return}
  const s=getSettings();
  s.apiKey=k;
  S.set('sahifa_settings',s);
  S.set('ptl_settings',s);
  S.set('sdt_settings',s);
  toast('Murshid connected.');
  renderConvo();
  renderSahifaCtx();
}

// ── CLEAR HISTORY ────────────────────────────────────────────────
function clearHistory(){
  if(confirm('Clear this conversation? Your sahifa entries are not affected.'))
  {S.set('murshid_history',[]);renderConvo();toast('Conversation cleared.')}
}

// ── INIT ─────────────────────────────────────────────────────────
renderSahifaCtx();
renderConvo();
updateQuickActions();
updateRightPanel();

// Add clear button to header
setTimeout(()=>{
  const hdr=document.querySelector('.convo-header');
  if(hdr){
    const cb=document.createElement('button');
    cb.className='btn-sm';cb.textContent='Clear';cb.style.marginLeft='8px';
    cb.onclick=clearHistory;
    hdr.appendChild(cb);
  }
},100);
</script>
